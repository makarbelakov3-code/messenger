<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Modern Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16162a;
            --border-color: #2a2a3e;
            --text-primary: #ffffff;
            --text-secondary: #8a8aaa;
            --accent: linear-gradient(135deg, #667eea, #764ba2);
            --message-own: linear-gradient(135deg, #667eea, #764ba2);
            --message-other: #1e1e32;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica Neue, sans-serif;
            background: var(--bg-primary);
            height: 100vh;
            overflow: hidden;
            width: 100%;
        }

        /* Основной контейнер */
        .app {
            display: flex;
            height: 100%;
            width: 100%;
        }

        /* Боковая панель */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h1 {
            font-size: 1.3rem;
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Профиль */
        .profile {
            padding: 16px;
            background: var(--bg-tertiary);
            margin: 12px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .profile-info {
            flex: 1;
            overflow: hidden;
        }

        .profile-info h3 {
            font-size: 0.95rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .profile-info p {
            font-size: 0.7rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .online-status {
            font-size: 0.7rem;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .online-status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
        }

        /* Список пользователей */
        .users-section, .chats-section {
            padding: 12px;
        }

        .section-title {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
            padding: 0 8px;
        }

        .user-item, .chat-item {
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-item:hover, .chat-item:hover {
            background: var(--bg-tertiary);
        }

        .user-item.active, .chat-item.active {
            background: var(--bg-tertiary);
            border-left: 3px solid #667eea;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .user-name {
            flex: 1;
            font-size: 0.85rem;
            color: var(--text-primary);
        }

        .user-status {
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        /* Настройки темы */
        .theme-section {
            padding: 16px 12px;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
        }

        .theme-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .color-picker {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: var(--bg-tertiary);
        }

        /* Основная область чата */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            min-width: 0;
        }

        .chat-header {
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .chat-header h2 {
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        .chat-header p {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Область сообщений */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.own {
            background: var(--message-own);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            background: var(--message-other);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-sender {
            font-size: 0.65rem;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .message-text {
            font-size: 0.85rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .message-time {
            font-size: 0.55rem;
            text-align: right;
            margin-top: 4px;
            opacity: 0.6;
        }

        .message-media {
            margin-top: 8px;
            border-radius: 12px;
            overflow: hidden;
        }

        .message-media img,
        .message-media video {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
        }

        .file-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.1);
            padding: 6px 10px;
            border-radius: 10px;
            text-decoration: none;
            color: inherit;
            font-size: 0.75rem;
            margin-top: 6px;
        }

        /* Область ввода */
        .input-area {
            background: var(--bg-secondary);
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            background: var(--bg-tertiary);
            border-radius: 24px;
            padding: 10px 16px;
            border: 1px solid var(--border-color);
        }

        .input-wrapper:focus-within {
            border-color: #667eea;
        }

        #messageInput {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: inherit;
            resize: none;
            outline: none;
        }

        .action-btn {
            width: 38px;
            height: 38px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .send-btn {
            background: #667eea;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0 18px;
            border-radius: 38px;
            cursor: pointer;
            height: 38px;
        }

        .system-message {
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-secondary);
            padding: 6px;
            margin: 4px auto;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 380px;
        }

        .modal-content h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .modal-field {
            margin-bottom: 16px;
        }

        .modal-field label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .modal-field input,
        .modal-field textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .save-btn {
            background: #667eea;
            color: white;
        }

        .cancel-btn {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        /* Скролл */
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        /* Мобильная версия */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 20;
                width: 260px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 15;
            }
            .menu-overlay.open {
                display: block;
            }
            .mobile-menu-btn {
                position: fixed;
                top: 12px;
                left: 12px;
                width: 40px;
                height: 40px;
                background: var(--bg-secondary);
                border: 1px solid var(--border-color);
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                z-index: 10;
                color: var(--text-primary);
                font-size: 1.2rem;
            }
            .chat-header {
                padding-left: 60px;
            }
        }

        @media (min-width: 769px) {
            .mobile-menu-btn, .menu-overlay {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="mobile-menu-btn" id="mobileMenuBtn">☰</div>
<div class="menu-overlay" id="menuOverlay"></div>

<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>Modern Messenger</h1>
        </div>
        
        <div class="profile" id="profileBtn">
            <div class="avatar" id="avatar">U</div>
            <div class="profile-info">
                <h3 id="profileName">Загрузка...</h3>
                <div class="online-status">Онлайн</div>
            </div>
        </div>

        <div class="chats-section">
            <div class="section-title">Личные чаты</div>
            <div id="chatsList"></div>
        </div>

        <div class="users-section">
            <div class="section-title">Пользователи онлайн</div>
            <div id="usersList"></div>
        </div>

        <div class="theme-section">
            <div class="theme-label">Цветовая тема</div>
            <input type="color" class="color-picker" id="colorPicker" value="#667eea">
        </div>
    </div>

    <div class="chat-main">
        <div class="chat-header">
            <h2 id="chatTitle">Общий чат</h2>
            <p id="chatSubtitle">Все участники видят сообщения</p>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="messageInput" rows="1" placeholder="Введите сообщение..."></textarea>
            </div>
            <button class="action-btn" id="fileBtn">📎</button>
            <button class="action-btn" id="imageBtn">🖼️</button>
            <button class="send-btn" id="sendBtn">Отправить</button>
        </div>
    </div>
</div>

<div class="modal" id="profileModal">
    <div class="modal-content">
        <h3>Редактирование профиля</h3>
        <div class="modal-field">
            <label>Имя пользователя</label>
            <input type="text" id="editName" maxlength="30">
        </div>
        <div class="modal-field">
            <label>Статус</label>
            <textarea id="editBio" rows="3" maxlength="100" placeholder="О себе..."></textarea>
        </div>
        <div class="modal-buttons">
            <button class="cancel-btn" id="closeModalBtn">Отмена</button>
            <button class="save-btn" id="saveProfileBtn">Сохранить</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // ========== ПЕРЕМЕННЫЕ ==========
    let socket = null;
    let currentUser = '';
    let userBio = '';
    let currentChat = 'all'; // 'all' или имя пользователя
    let onlineUsers = [];
    let chatsList = [];
    
    // DOM элементы
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileBtn = document.getElementById('fileBtn');
    const imageBtn = document.getElementById('imageBtn');
    const profileBtn = document.getElementById('profileBtn');
    const profileModal = document.getElementById('profileModal');
    const editName = document.getElementById('editName');
    const editBio = document.getElementById('editBio');
    const saveProfileBtn = document.getElementById('saveProfileBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const avatar = document.getElementById('avatar');
    const profileNameSpan = document.getElementById('profileName');
    const chatTitle = document.getElementById('chatTitle');
    const chatSubtitle = document.getElementById('chatSubtitle');
    const usersListDiv = document.getElementById('usersList');
    const chatsListDiv = document.getElementById('chatsList');
    const colorPicker = document.getElementById('colorPicker');
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const menuOverlay = document.getElementById('menuOverlay');
    const sidebar = document.getElementById('sidebar');

    // ========== ФУНКЦИИ ТЕМЫ ==========
    function applyTheme(color) {
        document.documentElement.style.setProperty('--accent', `linear-gradient(135deg, ${color}, ${color}cc)`);
        document.documentElement.style.setProperty('--message-own', `linear-gradient(135deg, ${color}, ${color}cc)`);
        localStorage.setItem('theme_color', color);
    }

    colorPicker.onchange = (e) => applyTheme(e.target.value);

    function loadTheme() {
        const savedColor = localStorage.getItem('theme_color');
        if (savedColor) {
            colorPicker.value = savedColor;
            applyTheme(savedColor);
        }
    }

    // ========== ВРЕМЯ ПО МСК ==========
    function getMskTime() {
        const now = new Date();
        const mskOffset = 3 * 60 * 60 * 1000;
        const mskTime = new Date(now.getTime() + mskOffset);
        return mskTime.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }

    // ========== ПРОФИЛЬ ==========
    function loadProfile() {
        const savedName = localStorage.getItem('profile_name');
        const savedBio = localStorage.getItem('profile_bio');
        if (savedName) currentUser = savedName;
        if (savedBio) userBio = savedBio;
        editName.value = currentUser || '';
        editBio.value = userBio || '';
        updateProfileUI();
    }

    function updateProfileUI() {
        const initial = currentUser ? currentUser.charAt(0).toUpperCase() : 'U';
        avatar.textContent = initial;
        profileNameSpan.textContent = currentUser || 'Пользователь';
    }

    function saveProfile() {
        const newName = editName.value.trim();
        if (!newName) {
            alert('Введите имя');
            return;
        }
        currentUser = newName;
        userBio = editBio.value;
        localStorage.setItem('profile_name', currentUser);
        localStorage.setItem('profile_bio', userBio);
        updateProfileUI();
        profileModal.classList.remove('active');
        if (socket && socket.connected) {
            socket.emit('register', { username: currentUser, color: colorPicker.value });
        }
    }

    // ========== UI СООБЩЕНИЙ ==========
    function addMessageToUI(msg, isOwn) {
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'own' : 'other'}`;
        let content = '';
        if (!isOwn && msg.from !== 'all') {
            content += `<div class="message-sender">${escapeHtml(msg.from)}</div>`;
        }
        if (msg.text) {
            content += `<div class="message-text">${escapeHtml(msg.text)}</div>`;
        }
        if (msg.files && msg.files.length) {
            msg.files.forEach(file => {
                const url = file.url;
                if (url.match(/\.(jpg|jpeg|png|gif|webp)/i)) {
                    content += `<div class="message-media"><img src="${url}" alt="image" onclick="window.open(this.src)"></div>`;
                } else if (url.match(/\.(mp4|webm|mov)/i)) {
                    content += `<div class="message-media"><video src="${url}" controls></video></div>`;
                } else {
                    content += `<a href="${url}" download class="file-link">📄 ${file.name}</a>`;
                }
            });
        }
        content += `<div class="message-time">${msg.time || getMskTime()}</div>`;
        div.innerHTML = content;
        messagesArea.appendChild(div);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function clearMessages() {
        messagesArea.innerHTML = '';
        const sysDiv = document.createElement('div');
        sysDiv.className = 'system-message';
        sysDiv.textContent = 'Добро пожаловать в Modern Messenger';
        messagesArea.appendChild(sysDiv);
    }

    // ========== ОТПРАВКА ==========
    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        
        socket.emit('message', {
            text: text,
            to: currentChat === 'all' ? 'all' : currentChat,
            files: [],
            time: getMskTime()
        });
        messageInput.value = '';
        messageInput.style.height = 'auto';
    }

    async function sendWithFiles(files) {
        const text = messageInput.value.trim();
        if (!text && !files.length) return;
        
        const uploadedFiles = [];
        for (const file of files) {
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            uploadedFiles.push({ url: data.url, name: data.name });
        }
        
        socket.emit('message', {
            text: text,
            to: currentChat === 'all' ? 'all' : currentChat,
            files: uploadedFiles,
            time: getMskTime()
        });
        messageInput.value = '';
        messageInput.style.height = 'auto';
    }

    // ========== СПИСКИ ==========
    function renderUsersList() {
        usersListDiv.innerHTML = '';
        onlineUsers.forEach(user => {
            if (user === currentUser) return;
            const div = document.createElement('div');
            div.className = `user-item ${currentChat === user ? 'active' : ''}`;
            div.innerHTML = `
                <div class="user-avatar" style="background: #667eea">${user.charAt(0).toUpperCase()}</div>
                <div class="user-name">${escapeHtml(user)}</div>
            `;
            div.onclick = () => {
                currentChat = user;
                chatTitle.textContent = user;
                chatSubtitle.textContent = 'Личный чат';
                clearMessages();
                socket.emit('get_chat_history', user);
                renderUsersList();
                renderChatsList();
                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('open');
                    menuOverlay.classList.remove('open');
                }
            };
            usersListDiv.appendChild(div);
        });
    }

    function renderChatsList() {
        chatsListDiv.innerHTML = '';
        chatsList.forEach(chat => {
            const div = document.createElement('div');
            div.className = `chat-item ${currentChat === chat.with ? 'active' : ''}`;
            div.innerHTML = `
                <div class="user-avatar" style="background: #764ba2">${chat.with.charAt(0).toUpperCase()}</div>
                <div class="user-name">${escapeHtml(chat.with)}</div>
            `;
            div.onclick = () => {
                currentChat = chat.with;
                chatTitle.textContent = chat.with;
                chatSubtitle.textContent = 'Личный чат';
                clearMessages();
                socket.emit('get_chat_history', chat.with);
                renderUsersList();
                renderChatsList();
                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('open');
                    menuOverlay.classList.remove('open');
                }
            };
            chatsListDiv.appendChild(div);
        });
    }

    function updatePublicChat() {
        currentChat = 'all';
        chatTitle.textContent = 'Общий чат';
        chatSubtitle.textContent = 'Все участники видят сообщения';
        clearMessages();
        renderUsersList();
        renderChatsList();
    }

    // ========== СОКЕТ ==========
    function initSocket() {
        socket = io();
        
        socket.on('connect', () => {
            socket.emit('register', { username: currentUser, color: colorPicker.value });
        });
        
        socket.on('history', (msgs) => {
            clearMessages();
            msgs.forEach(msg => addMessageToUI(msg, msg.from === currentUser));
        });
        
        socket.on('message', (msg) => {
            if (currentChat === 'all') {
                addMessageToUI(msg, msg.from === currentUser);
            }
        });
        
        socket.on('private_message', (msg) => {
            if (currentChat === msg.from || currentChat === msg.to) {
                addMessageToUI(msg, msg.from === currentUser);
            }
            // Обновляем список чатов
            socket.emit('get_chats');
        });
        
        socket.on('chat_history', (data) => {
            if (currentChat === data.targetUser) {
                clearMessages();
                data.messages.forEach(msg => addMessageToUI(msg, msg.from === currentUser));
            }
        });
        
        socket.on('chats_list', (chats) => {
            chatsList = chats;
            renderChatsList();
        });
        
        socket.on('user_list', (users) => {
            onlineUsers = users;
            renderUsersList();
        });
        
        socket.on('user_joined', (text) => {
            const sysDiv = document.createElement('div');
            sysDiv.className = 'system-message';
            sysDiv.textContent = text;
            messagesArea.appendChild(sysDiv);
            setTimeout(() => sysDiv.remove(), 4000);
        });
        
        socket.on('user_left', (text) => {
            const sysDiv = document.createElement('div');
            sysDiv.className = 'system-message';
            sysDiv.textContent = text;
            messagesArea.appendChild(sysDiv);
            setTimeout(() => sysDiv.remove(), 4000);
        });
    }

    // ========== УТИЛИТЫ ==========
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== ОБРАБОТЧИКИ ==========
    function setupEventHandlers() {
        sendBtn.onclick = sendMessage;
        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        fileBtn.onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.multiple = true;
            input.onchange = (e) => sendWithFiles(Array.from(e.target.files));
            input.click();
        };
        
        imageBtn.onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,video/*';
            input.multiple = true;
            input.onchange = (e) => sendWithFiles(Array.from(e.target.files));
            input.click();
        };
        
        profileBtn.onclick = () => {
            editName.value = currentUser;
            editBio.value = userBio;
            profileModal.classList.add('active');
        };
        
        saveProfileBtn.onclick = saveProfile;
        closeModalBtn.onclick = () => profileModal.classList.remove('active');
        
        // Мобильное меню
        if (mobileMenuBtn) {
            mobileMenuBtn.onclick = () => {
                sidebar.classList.toggle('open');
                menuOverlay.classList.toggle('open');
            };
        }
        if (menuOverlay) {
            menuOverlay.onclick = () => {
                sidebar.classList.remove('open');
                menuOverlay.classList.remove('open');
            };
        }
        
        window.onclick = (e) => {
            if (e.target === profileModal) profileModal.classList.remove('active');
        };
        
        // Кнопка общего чата в заголовке
        const chatHeader = document.querySelector('.chat-header');
        if (chatHeader) {
            chatHeader.onclick = () => {
                updatePublicChat();
            };
        }
    }

    // ========== ЗАПУСК ==========
    loadProfile();
    loadTheme();
    initSocket();
    setupEventHandlers();
    
    // Запрос истории чатов
    setInterval(() => {
        if (socket && socket.connected) {
            socket.emit('get_chats');
        }
    }, 5000);
</script>
</body>
</html>
