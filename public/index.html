<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>HOPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #f5f5f5; --bg-secondary: #ffffff; --bg-tertiary: #f0f0f0;
            --bg-hover: #e8e8e8; --border-color: #e0e0e0; --text-primary: #1a1a2e;
            --text-secondary: #666666; --text-muted: #999999; --accent: #0088cc;
            --accent-dark: #006699; --success: #10b981; --danger: #ef4444;
            --message-own: #d9f0ec; --message-other: #ffffff;
        }
        body.dark {
            --bg-primary: #0f0f1a; --bg-secondary: #1a1a2e; --bg-tertiary: #16162a;
            --bg-hover: #1e1e32; --border-color: #2a2a3e; --text-primary: #ffffff;
            --text-secondary: #8a8aaa; --text-muted: #6c6c8e; --message-own: #2d4a6e;
            --message-other: #1e1e32;
        }
        html, body { height: 100%; width: 100%; overflow: hidden; position: fixed; top: 0; left: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); transition: 0.3s; }
        .app { display: flex; height: 100%; width: 100%; overflow: hidden; }
        .auth-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #0088cc, #006699);
            display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-container { background: var(--bg-secondary); border-radius: 32px; padding: 40px; width: 90%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .auth-logo { text-align: center; margin-bottom: 32px; }
        .auth-logo h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #0088cc, #006699); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .auth-tabs { display: flex; gap: 12px; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); }
        .auth-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; color: var(--text-secondary); font-weight: 500; position: relative; }
        .auth-tab.active { color: var(--accent); }
        .auth-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--accent); }
        .auth-form { display: flex; flex-direction: column; gap: 16px; }
        .auth-form.hidden { display: none; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 0.75rem; color: var(--text-secondary); font-weight: 500; }
        .input-group input, .input-group textarea { padding: 14px 16px; background: var(--bg-tertiary); border: 1px solid var(--border-color);
            border-radius: 12px; color: var(--text-primary); font-size: 0.9rem; }
        .password-wrapper { position: relative; }
        .password-wrapper input { width: 100%; padding-right: 46px; }
        .toggle-password { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; }
        .auth-btn { padding: 14px; background: linear-gradient(135deg, #0088cc, #006699); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; }
        .auth-error { background: rgba(239,68,68,0.1); border: 1px solid var(--danger); border-radius: 12px; padding: 10px; text-align: center; font-size: 0.8rem; color: var(--danger); display: none; }
        .sidebar { width: 320px; background: var(--bg-secondary); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar-profile { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .sidebar-profile:hover { background: var(--bg-hover); }
        .profile-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #0088cc, #006699); display: flex;
            align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 600; color: white; flex-shrink: 0; }
        .profile-info { flex: 1; }
        .profile-name { font-weight: 600; font-size: 0.95rem; }
        .profile-status { font-size: 0.7rem; color: var(--text-secondary); }
        .search-container { padding: 12px 16px; }
        .search-input { width: 100%; padding: 10px 14px; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 9999px; color: var(--text-primary); }
        .section-header { padding: 16px 16px 8px; display: flex; justify-content: space-between; align-items: center; }
        .section-title { font-size: 0.7rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; }
        .section-action { font-size: 0.7rem; color: var(--accent); cursor: pointer; }
        .chat-item, .contact-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; transition: 0.2s; }
        .chat-item:hover, .contact-item:hover { background: var(--bg-hover); }
        .chat-item.active { background: var(--bg-tertiary); border-left: 3px solid var(--accent); }
        .chat-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #0088cc, #006699); display: flex;
            align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 600; color: white; flex-shrink: 0; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 500; font-size: 0.9rem; }
        .chat-preview { font-size: 0.75rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-meta { text-align: right; }
        .chat-time { font-size: 0.65rem; color: var(--text-muted); }
        .theme-switch { padding: 12px 16px; border-top: 1px solid var(--border-color); margin-top: auto; display: flex; justify-content: space-between; align-items: center; }
        .theme-toggle { width: 50px; height: 26px; background: var(--bg-tertiary); border-radius: 9999px; cursor: pointer; position: relative; border: 1px solid var(--border-color); }
        .theme-toggle.active { background: var(--accent); }
        .theme-toggle::after { content: ''; width: 22px; height: 22px; background: white; border-radius: 50%; position: absolute; top: 1px; left: 2px; transition: 0.3s; }
        .theme-toggle.active::after { left: 26px; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); min-width: 0; height: 100%; }
        .chat-header { padding: 16px 20px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .chat-header-info { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .chat-header-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #0088cc, #006699); display: flex;
            align-items: center; justify-content: center; font-size: 1rem; font-weight: 600; color: white; }
        .chat-header-details h2 { font-size: 1rem; font-weight: 600; }
        .chat-header-details p { font-size: 0.7rem; color: var(--text-secondary); }
        .chat-actions { display: flex; gap: 8px; }
        .chat-action-btn { width: 36px; height: 36px; background: var(--bg-tertiary); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
        .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 70%; padding: 10px 14px; border-radius: 18px; position: relative; }
        .message.own { background: var(--message-own); align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.other { background: var(--message-other); align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .message-sender { font-size: 0.65rem; font-weight: 600; margin-bottom: 4px; opacity: 0.7; }
        .message-text { font-size: 0.9rem; line-height: 1.4; word-break: break-word; }
        .message-time { font-size: 0.55rem; text-align: right; margin-top: 4px; opacity: 0.6; }
        .message-actions { position: absolute; right: 8px; top: -24px; display: none; gap: 4px; background: var(--bg-secondary);
            border-radius: 20px; padding: 4px 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 10; }
        .message:hover .message-actions { display: flex; }
        .message-action-btn { background: none; border: none; cursor: pointer; font-size: 0.8rem; padding: 4px; border-radius: 50%; color: var(--text-secondary); }
        .reactions { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
        .reaction { background: var(--bg-tertiary); border-radius: 20px; padding: 2px 6px; font-size: 0.7rem; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
        .reaction.active { background: var(--accent); color: white; }
        .reply-preview { background: var(--bg-tertiary); border-left: 3px solid var(--accent); padding: 6px 10px; border-radius: 8px; margin-bottom: 8px; font-size: 0.75rem; cursor: pointer; }
        .message-media img, .message-media video { max-width: 100%; max-height: 250px; border-radius: 12px; margin-top: 6px; cursor: pointer; }
        .file-message { display: inline-flex; align-items: center; gap: 8px; background: var(--bg-tertiary); padding: 8px 12px; border-radius: 12px; margin-top: 6px; text-decoration: none; color: var(--text-primary); font-size: 0.8rem; }
        .system-message { text-align: center; font-size: 0.7rem; color: var(--text-muted); padding: 6px; }
        .file-preview-area { display: none; flex-wrap: wrap; gap: 8px; padding: 8px 16px; background: var(--bg-secondary); border-top: 1px solid var(--border-color); }
        .file-preview-item { position: relative; width: 80px; height: 80px; background: var(--bg-tertiary); border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); }
        .file-preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .remove-file-btn { position: absolute; top: -8px; right: -8px; width: 22px; height: 22px; background: var(--danger); color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 12px; }
        .voice-recording { display: none; align-items: center; gap: 12px; padding: 8px 16px; background: var(--bg-secondary); border-top: 1px solid var(--border-color); }
        .voice-recording-btn { width: 40px; height: 40px; background: var(--danger); border: none; border-radius: 50%; cursor: pointer; color: white; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .input-area { background: var(--bg-secondary); padding: 12px 16px; border-top: 1px solid var(--border-color); display: flex; gap: 10px; align-items: center; }
        .attach-btn, .voice-btn { width: 42px; height: 42px; background: var(--bg-tertiary); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 1.2rem; }
        .voice-btn.recording { background: var(--danger); color: white; animation: pulse 1s infinite; }
        .input-wrapper { flex: 1; background: var(--bg-tertiary); border-radius: 24px; padding: 10px 16px; border: 1px solid var(--border-color); }
        .input-wrapper:focus-within { border-color: var(--accent); }
        #messageInput { width: 100%; background: transparent; border: none; color: var(--text-primary); font-size: 0.9rem; font-family: inherit; resize: none; outline: none; }
        .send-btn { width: 42px; height: 42px; background: var(--accent); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-secondary); border-radius: 24px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 1.2rem; }
        .modal-close { width: 32px; height: 32px; background: var(--bg-tertiary); border: none; border-radius: 50%; cursor: pointer; }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 16px 20px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 12px; }
        .btn-primary { padding: 10px 20px; background: var(--accent); border: none; border-radius: 12px; color: white; cursor: pointer; }
        .btn-secondary { padding: 10px 20px; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 12px; cursor: pointer; }
        .search-result { padding: 12px; cursor: pointer; border-bottom: 1px solid var(--border-color); }
        .search-result:hover { background: var(--bg-hover); }
        .gallery-image { width: calc(33.33% - 8px); margin: 4px; border-radius: 12px; cursor: pointer; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); transition: 0.3s; z-index: 30; width: 280px; }
            .sidebar.open { transform: translateX(0); }
            .mobile-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 25; }
            .mobile-overlay.open { display: block; }
            .mobile-menu-btn { position: fixed; top: 14px; left: 14px; width: 40px; height: 40px; background: var(--bg-secondary); border: 1px solid var(--border-color);
                border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 15; font-size: 1.2rem; }
            .chat-header { padding: 12px 16px; padding-left: 60px; }
            .message { max-width: 85%; }
        }
        @media (min-width: 769px) { .mobile-menu-btn, .mobile-overlay { display: none; } }
    </style>
</head>
<body>
<div class="auth-screen" id="authScreen">
    <div class="auth-container">
        <div class="auth-logo"><h1>HOPS</h1><p>Быстро. Безопасно. Удобно.</p></div>
        <div class="auth-tabs"><div class="auth-tab active" data-tab="login">Вход</div><div class="auth-tab" data-tab="register">Регистрация</div></div>
        <form id="loginForm" class="auth-form">
            <div class="input-group"><label>Имя пользователя</label><input type="text" id="loginUsername" placeholder="Введите имя"></div>
            <div class="input-group"><label>Пароль</label><div class="password-wrapper"><input type="password" id="loginPassword" placeholder="Пароль"><span class="toggle-password" data-target="loginPassword">👁️</span></div></div>
            <div id="loginError" class="auth-error"></div>
            <button type="submit" class="auth-btn">Войти</button>
        </form>
        <form id="registerForm" class="auth-form hidden">
            <div class="input-group"><label>Имя пользователя</label><input type="text" id="regUsername" placeholder="Имя пользователя"></div>
            <div class="input-group"><label>Ваше имя</label><input type="text" id="regName" placeholder="Как вас называть"></div>
            <div class="input-group"><label>Пароль</label><div class="password-wrapper"><input type="password" id="regPassword" placeholder="Пароль"><span class="toggle-password" data-target="regPassword">👁️</span></div></div>
            <div class="input-group"><label>Подтверждение</label><div class="password-wrapper"><input type="password" id="regConfirmPassword" placeholder="Повторите пароль"><span class="toggle-password" data-target="regConfirmPassword">👁️</span></div></div>
            <div id="registerError" class="auth-error"></div>
            <button type="submit" class="auth-btn">Зарегистрироваться</button>
        </form>
    </div>
</div>

<div class="mobile-menu-btn" id="mobileMenuBtn">☰</div>
<div class="mobile-overlay" id="mobileOverlay"></div>
<div class="app" id="app" style="display: none;">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-profile" id="profileBtn">
            <div class="profile-avatar" id="sidebarAvatar"><span id="sidebarAvatarText">U</span></div>
            <div class="profile-info"><div class="profile-name" id="sidebarName">Загрузка</div><div class="profile-status" id="sidebarStatus">онлайн</div></div>
        </div>
        <div class="search-container"><input type="text" class="search-input" id="searchInput" placeholder="Поиск"></div>
        <div class="section-header"><div class="section-title">Чаты</div><div class="section-action" id="newChatBtn">+ Новый</div></div>
        <div class="chats-list" id="chatsList"></div>
        <div class="section-header"><div class="section-title">Контакты</div></div>
        <div class="contacts-list" id="contactsList"></div>
        <div class="theme-switch"><span>🌙 Тёмная тема</span><div class="theme-toggle" id="themeToggle"></div></div>
    </div>
    <div class="chat-main">
        <div class="chat-header">
            <div class="chat-header-info" id="chatInfoBtn"><div class="chat-header-avatar" id="chatAvatar">💬</div><div class="chat-header-details"><h2 id="chatName">HOPS</h2><p id="chatStatus">Выберите чат</p></div></div>
            <div class="chat-actions"><button class="chat-action-btn" id="searchChatBtn">🔍</button><button class="chat-action-btn" id="galleryBtn">🖼️</button><button class="chat-action-btn" id="exportChatBtn">📎</button></div>
        </div>
        <div class="messages-area" id="messagesArea"><div class="system-message">Выберите чат</div></div>
        <div class="file-preview-area" id="filePreviewArea"></div>
        <div class="voice-recording" id="voiceRecordingPanel"><div class="voice-recording-btn" id="stopRecordingBtn">⏹️</div><span>Запись... <span id="recordingTime">0:00</span></span></div>
        <div class="input-area" id="inputArea" style="display: none;">
            <button class="attach-btn" id="attachFileBtn">📎</button>
            <button class="voice-btn" id="voiceBtn">🎤</button>
            <div class="input-wrapper"><textarea id="messageInput" rows="1" placeholder="Сообщение"></textarea></div>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>
</div>

<div class="modal" id="profileModal"><div class="modal-content"><div class="modal-header"><h3>Профиль</h3><button class="modal-close" id="closeProfileModal">✕</button></div><div class="modal-body"><div id="avatarPreview" style="width:100px;height:100px;border-radius:50%;margin:0 auto 20px;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;"><span id="avatarPreviewText">U</span><img id="avatarPreviewImg" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:50%;"></div><input type="file" id="avatarInput" accept="image/*" style="display:none"><div class="input-group"><label>Имя</label><input type="text" id="profileNameInput"></div><div class="input-group"><label>О себе</label><textarea id="profileBioInput" rows="3"></textarea></div></div><div class="modal-footer"><button class="btn-secondary" id="cancelProfileBtn">Отмена</button><button class="btn-primary" id="saveProfileBtn">Сохранить</button></div></div></div>
<div class="modal" id="newChatModal"><div class="modal-content"><div class="modal-header"><h3>Новый чат</h3><button class="modal-close" id="closeNewChatModal">✕</button></div><div class="modal-body"><input type="text" id="searchUsersInput" placeholder="Поиск" style="width:100%;padding:12px;background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:12px;margin-bottom:16px"><div id="searchUsersList"></div></div></div></div>
<div class="modal" id="searchModal"><div class="modal-content"><div class="modal-header"><h3>Поиск</h3><button class="modal-close" id="closeSearchModal">✕</button></div><div class="modal-body"><input type="text" id="searchMessagesInput" placeholder="Введите текст..." style="width:100%;padding:12px;background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:12px;margin-bottom:16px"><div id="searchMessagesList"></div></div></div></div>
<div class="modal" id="galleryModal"><div class="modal-content"><div class="modal-header"><h3>Галерея</h3><button class="modal-close" id="closeGalleryModal">✕</button></div><div class="modal-body" id="galleryList" style="display:flex;flex-wrap:wrap;"></div></div></div>
<div class="modal" id="callModal"><div class="modal-content"><div class="modal-header"><h3 id="callTitle">Звонок</h3><button class="modal-close" id="closeCallModal">✕</button></div><div class="modal-body"><video id="localVideo" autoplay muted style="width:100%;border-radius:16px;margin-bottom:12px"></video><video id="remoteVideo" autoplay style="width:100%;border-radius:16px"></video><div id="callStatus" style="margin:16px 0">Подключение...</div><div style="display:flex;justify-content:center;gap:16px"><button id="hangupBtn" style="padding:12px 24px;background:var(--danger);border:none;border-radius:30px;color:white">Завершить</button></div></div></div></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let socket = null, currentUser = null, currentChatId = null, currentChat = null, allUsers = [], userChats = [], pendingFiles = [], mediaRecorder = null, audioChunks = [], isRecording = false, recordingTimer = null, recordingSeconds = 0;
    let peerConnection = null, localStream = null, replyToMessage = null;
    const messageInput = document.getElementById('messageInput'), sendBtn = document.getElementById('sendBtn'), messagesArea = document.getElementById('messagesArea'), chatsListDiv = document.getElementById('chatsList'), contactsListDiv = document.getElementById('contactsList'), searchInput = document.getElementById('searchInput'), themeToggle = document.getElementById('themeToggle'), filePreviewArea = document.getElementById('filePreviewArea'), voiceBtn = document.getElementById('voiceBtn'), voiceRecordingPanel = document.getElementById('voiceRecordingPanel'), recordingTimeSpan = document.getElementById('recordingTime'), stopRecordingBtn = document.getElementById('stopRecordingBtn');

    function formatTime(date) { return new Date(date).toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' }); }
    function formatDate(date) { let d = new Date(date), now = new Date(); if(d.toDateString() === now.toDateString()) return formatTime(date); return d.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit' }); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function updateProfileUI() { if(!currentUser) return; let initial = (currentUser.name || currentUser.username)[0].toUpperCase(); document.getElementById('sidebarAvatarText').innerHTML = initial; document.getElementById('sidebarName').innerHTML = currentUser.name || currentUser.username; }

    function addFileToPreview(file) {
        let reader = new FileReader();
        reader.onload = (e) => {
            let id = Date.now() + Math.random();
            pendingFiles.push({ file, previewUrl: e.target.result, name: file.name, id });
            let div = document.createElement('div'); div.className = 'file-preview-item'; div.dataset.id = id;
            div.innerHTML = `<img src="${e.target.result}"><button class="remove-file-btn" data-id="${id}">✕</button><div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.6);color:white;font-size:8px;padding:2px;text-align:center">${file.name.substring(0,10)}</div>`;
            filePreviewArea.appendChild(div); filePreviewArea.style.display = 'flex';
            div.querySelector('.remove-file-btn').addEventListener('click', (e) => { e.stopPropagation(); removeFileFromPreview(id); });
        };
        reader.readAsDataURL(file);
    }
