<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Modern Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16162a;
            --border-color: #2a2a3e;
            --text-primary: #ffffff;
            --text-secondary: #8a8aaa;
            --accent: linear-gradient(135deg, #667eea, #764ba2);
            --message-own: linear-gradient(135deg, #667eea, #764ba2);
            --message-other: #1e1e32;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica Neue, sans-serif;
            background: var(--bg-primary);
            height: 100vh;
            overflow: hidden;
            width: 100%;
            position: fixed;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
        }

        /* Боковая панель */
        .sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h1 {
            font-size: 1.3rem;
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Профиль */
        .profile {
            padding: 16px;
            background: var(--bg-tertiary);
            margin: 12px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .profile-info {
            flex: 1;
            overflow: hidden;
        }

        .profile-info h3 {
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .profile-info p {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* Создание группы */
        .create-group {
            padding: 12px;
            margin: 8px 12px;
            background: var(--bg-tertiary);
            border-radius: 12px;
        }

        .create-group input {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .create-group button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }

        /* Секции */
        .section-title {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin: 12px 12px 6px 12px;
        }

        .chats-list, .users-list {
            max-height: 250px;
            overflow-y: auto;
        }

        .chat-item, .user-item {
            padding: 10px 12px;
            margin: 0 8px 4px 8px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-item:hover, .user-item:hover {
            background: var(--bg-tertiary);
        }

        .chat-item.active, .user-item.active {
            background: var(--bg-tertiary);
            border-left: 3px solid #667eea;
        }

        .item-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .group-avatar {
            background: #764ba2;
        }

        .private-avatar {
            background: #667eea;
        }

        .item-info {
            flex: 1;
            min-width: 0;
        }

        .item-name {
            font-size: 0.85rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-preview {
            font-size: 0.65rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            margin-left: 6px;
        }

        /* Настройки темы */
        .theme-section {
            padding: 16px 12px;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
        }

        .theme-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .color-picker {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: var(--bg-tertiary);
        }

        /* Основная область чата */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            min-width: 0;
            height: 100%;
        }

        .chat-header {
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        .chat-header p {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .chat-actions {
            display: flex;
            gap: 8px;
        }

        .chat-action-btn {
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.7rem;
            cursor: pointer;
        }

        /* Область сообщений */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.own {
            background: var(--message-own);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            background: var(--message-other);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-sender {
            font-size: 0.65rem;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .message-text {
            font-size: 0.85rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .message-time {
            font-size: 0.55rem;
            text-align: right;
            margin-top: 4px;
            opacity: 0.6;
        }

        .message-media {
            margin-top: 8px;
            border-radius: 12px;
            overflow: hidden;
        }

        .message-media img,
        .message-media video {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
        }

        .file-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.1);
            padding: 6px 10px;
            border-radius: 10px;
            text-decoration: none;
            color: inherit;
            font-size: 0.75rem;
            margin-top: 6px;
        }

        /* Область ввода */
        .input-area {
            background: var(--bg-secondary);
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;
            background: var(--bg-tertiary);
            border-radius: 24px;
            padding: 10px 16px;
            border: 1px solid var(--border-color);
        }

        .input-wrapper:focus-within {
            border-color: #667eea;
        }

        #messageInput {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: inherit;
            resize: none;
            outline: none;
        }

        .action-btn {
            width: 38px;
            height: 38px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .send-btn {
            background: #667eea;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0 18px;
            border-radius: 38px;
            cursor: pointer;
            height: 38px;
        }

        .system-message {
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-secondary);
            padding: 6px;
            margin: 4px auto;
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 380px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .modal-field {
            margin-bottom: 16px;
        }

        .modal-field label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .modal-field input,
        .modal-field textarea,
        .modal-field select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
        }

        .participant-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .participant-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
        }

        .participant-item:hover {
            background: var(--bg-tertiary);
        }

        .participant-item input {
            width: 18px;
            height: 18px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .save-btn {
            background: #667eea;
            color: white;
        }

        .cancel-btn {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        /* Мобильная версия */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 20;
                width: 280px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 15;
            }
            .menu-overlay.open {
                display: block;
            }
            .mobile-menu-btn {
                position: fixed;
                top: 12px;
                left: 12px;
                width: 40px;
                height: 40px;
                background: var(--bg-secondary);
                border: 1px solid var(--border-color);
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                z-index: 10;
                color: var(--text-primary);
                font-size: 1.2rem;
            }
            .chat-header {
                padding: 12px 16px;
                padding-left: 60px;
            }
            .input-area {
                padding-bottom: env(safe-area-inset-bottom, 12px);
            }
            .message {
                max-width: 85%;
            }
        }

        @media (min-width: 769px) {
            .mobile-menu-btn, .menu-overlay {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="mobile-menu-btn" id="mobileMenuBtn">☰</div>
<div class="menu-overlay" id="menuOverlay"></div>

<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>Modern Messenger</h1>
        </div>
        
        <div class="profile" id="profileBtn">
            <div class="avatar" id="avatar">U</div>
            <div class="profile-info">
                <h3 id="profileName">Загрузка...</h3>
                <p id="profileBio"></p>
            </div>
        </div>

        <div class="create-group">
            <input type="text" id="groupNameInput" placeholder="Название группы">
            <button id="createGroupBtn">➕ Создать группу</button>
        </div>

        <div class="section-title">Чаты</div>
        <div class="chats-list" id="chatsList"></div>

        <div class="section-title">Пользователи</div>
        <div class="users-list" id="usersList"></div>

        <div class="theme-section">
            <div class="theme-label">Цветовая тема</div>
            <input type="color" class="color-picker" id="colorPicker" value="#667eea">
        </div>
    </div>

    <div class="chat-main">
        <div class="chat-header" id="publicChatBtn">
            <div>
                <h2 id="chatTitle">Общий чат</h2>
                <p id="chatSubtitle">Все участники видят сообщения</p>
            </div>
            <div class="chat-actions" id="chatActions" style="display: none;">
                <button class="chat-action-btn" id="addMemberBtn">➕ Добавить</button>
                <button class="chat-action-btn" id="infoBtn">ℹ️ Инфо</button>
            </div>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="messageInput" rows="1" placeholder="Введите сообщение..."></textarea>
            </div>
            <button class="action-btn" id="fileBtn">📎</button>
            <button class="action-btn" id="imageBtn">🖼️</button>
            <button class="send-btn" id="sendBtn">Отправить</button>
        </div>
    </div>
</div>

<!-- Модальное окно профиля -->
<div class="modal" id="profileModal">
    <div class="modal-content">
        <h3>Редактирование профиля</h3>
        <div class="modal-field">
            <label>Имя пользователя</label>
            <input type="text" id="editName" maxlength="30">
        </div>
        <div class="modal-field">
            <label>Статус</label>
            <textarea id="editBio" rows="3" maxlength="100" placeholder="О себе..."></textarea>
        </div>
        <div class="modal-buttons">
            <button class="cancel-btn" id="closeModalBtn">Отмена</button>
            <button class="save-btn" id="saveProfileBtn">Сохранить</button>
        </div>
    </div>
</div>

<!-- Модальное окно создания группы -->
<div class="modal" id="createGroupModal">
    <div class="modal-content">
        <h3>Создание группы</h3>
        <div class="modal-field">
            <label>Название группы</label>
            <input type="text" id="modalGroupName" maxlength="50">
        </div>
        <div class="modal-field">
            <label>Выберите участников</label>
            <div class="participant-list" id="participantList"></div>
        </div>
        <div class="modal-buttons">
            <button class="cancel-btn" id="closeGroupModalBtn">Отмена</button>
            <button class="save-btn" id="confirmCreateGroupBtn">Создать</button>
        </div>
    </div>
</div>

<!-- Модальное окно добавления участника -->
<div class="modal" id="addMemberModal">
    <div class="modal-content">
        <h3>Добавить участника</h3>
        <div class="modal-field">
            <label>Выберите пользователя</label>
            <div class="participant-list" id="addMemberList"></div>
        </div>
        <div class="modal-buttons">
            <button class="cancel-btn" id="closeAddMemberBtn">Отмена</button>
            <button class="save-btn" id="confirmAddMemberBtn">Добавить</button>
        </div>
    </div>
</div>

<!-- Модальное окно информации о чате -->
<div class="modal" id="chatInfoModal">
    <div class="modal-content">
        <h3 id="infoModalTitle">Информация</h3>
        <div id="infoModalContent"></div>
        <div class="modal-buttons">
            <button class="cancel-btn" id="closeInfoModalBtn">Закрыть</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // ========== ПЕРЕМЕННЫЕ ==========
    let socket = null;
    let currentUser = '';
    let userBio = '';
    let currentChatId = 'public';
    let currentChatInfo = null;
    let allUsers = [];
    let onlineUsers = [];
    let userChats = [];
    let notificationsEnabled = true;
    let unreadCount = 0;
    let originalTitle = document.title;
    
    // DOM элементы
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileBtn = document.getElementById('fileBtn');
    const imageBtn = document.getElementById('imageBtn');
    const profileBtn = document.getElementById('profileBtn');
    const profileModal = document.getElementById('profileModal');
    const editName = document.getElementById('editName');
    const editBio = document.getElementById('editBio');
    const saveProfileBtn = document.getElementById('saveProfileBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const avatar = document.getElementById('avatar');
    const profileNameSpan = document.getElementById('profileName');
    const profileBioSpan = document.getElementById('profileBio');
    const chatTitle = document.getElementById('chatTitle');
    const chatSubtitle = document.getElementById('chatSubtitle');
    const usersListDiv = document.getElementById('usersList');
    const chatsListDiv = document.getElementById('chatsList');
    const colorPicker = document.getElementById('colorPicker');
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const menuOverlay = document.getElementById('menuOverlay');
    const sidebar = document.getElementById('sidebar');
    const publicChatBtn = document.getElementById('publicChatBtn');
    const createGroupBtn = document.getElementById('createGroupBtn');
    const groupNameInput = document.getElementById('groupNameInput');
    const chatActions = document.getElementById('chatActions');
    const addMemberBtn = document.getElementById('addMemberBtn');
    const infoBtn = document.getElementById('infoBtn');
    
    // Модальные окна
    const createGroupModal = document.getElementById('createGroupModal');
    const addMemberModal = document.getElementById('addMemberModal');
    const chatInfoModal = document.getElementById('chatInfoModal');
    const modalGroupName = document.getElementById('modalGroupName');
    const participantList = document.getElementById('participantList');
    const addMemberList = document.getElementById('addMemberList');
    const closeGroupModalBtn = document.getElementById('closeGroupModalBtn');
    const confirmCreateGroupBtn = document.getElementById('confirmCreateGroupBtn');
    const closeAddMemberBtn = document.getElementById('closeAddMemberBtn');
    const confirmAddMemberBtn = document.getElementById('confirmAddMemberBtn');
    const closeInfoModalBtn = document.getElementById('closeInfoModalBtn');
    const infoModalTitle = document.getElementById('infoModalTitle');
    const infoModalContent = document.getElementById('infoModalContent');

    // ========== УВЕДОМЛЕНИЯ ==========
    async function requestNotificationPermission() {
        if (!('Notification' in window)) return;
        if (Notification.permission === 'granted') return;
        if (Notification.permission !== 'denied') {
            await Notification.requestPermission();
        }
    }

    function showNotification(title, body) {
        if (!notificationsEnabled) return;
        if (document.hasFocus()) return;
        if (Notification.permission === 'granted') {
            new Notification(title, { body: body });
        }
    }

    function updateUnreadCount() {
        if (!document.hasFocus()) {
            unreadCount++;
            document.title = `(${unreadCount}) Modern Messenger`;
        }
    }

    function resetUnreadCount() {
        unreadCount = 0;
        document.title = originalTitle;
    }

    window.addEventListener('focus', resetUnreadCount);
    requestNotificationPermission();

    // ========== ТЕМА ==========
    function applyTheme(color) {
        document.documentElement.style.setProperty('--accent', `linear-gradient(135deg, ${color}, ${color}cc)`);
        document.documentElement.style.setProperty('--message-own', `linear-gradient(135deg, ${color}, ${color}cc)`);
        localStorage.setItem('theme_color', color);
    }

    colorPicker.onchange = (e) => applyTheme(e.target.value);

    function loadTheme() {
        const savedColor = localStorage.getItem('theme_color');
        if (savedColor) {
            colorPicker.value = savedColor;
            applyTheme(savedColor);
        }
    }

    // ========== ВРЕМЯ ==========
    function getMskTime() {
        const now = new Date();
        const mskOffset = 3 * 60 * 60 * 1000;
        const mskTime = new Date(now.getTime() + mskOffset);
        return mskTime.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }

    // ========== ПРОФИЛЬ ==========
    function loadProfile() {
        const savedName = localStorage.getItem('profile_name');
        const savedBio = localStorage.getItem('profile_bio');
        if (savedName) currentUser = savedName;
        if (savedBio) userBio = savedBio;
        editName.value = currentUser || '';
        editBio.value = userBio || '';
        updateProfileUI();
    }

    function updateProfileUI() {
        const initial = currentUser ? currentUser.charAt(0).toUpperCase() : 'U';
        avatar.textContent = initial;
        profileNameSpan.textContent = currentUser || 'Пользователь';
        profileBioSpan.textContent = userBio || '';
    }

    function saveProfile() {
        const newName = editName.value.trim();
        if (!newName) {
            alert('Введите имя');
            return;
        }
        currentUser = newName;
        userBio = editBio.value;
        localStorage.setItem('profile_name', currentUser);
        localStorage.setItem('profile_bio', userBio);
        updateProfileUI();
        profileModal.classList.remove('active');
        if (socket && socket.connected) {
            socket.emit('register', { username: currentUser, color: colorPicker.value, bio: userBio });
        }
    }

    // ========== UI СООБЩЕНИЙ ==========
    function addMessageToUI(message, isOwn) {
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'own' : 'other'}`;
        let content = '';
        if (!isOwn && message.from !== currentUser) {
            content += `<div class="message-sender">${escapeHtml(message.from)}</div>`;
        }
        if (message.text) {
            content += `<div class="message-text">${escapeHtml(message.text)}</div>`;
        }
        if (message.files && message.files.length) {
            message.files.forEach(file => {
                const url = file.url;
                if (url.match(/\.(jpg|jpeg|png|gif|webp)/i)) {
                    content += `<div class="message-media"><img src="${url}" alt="image" onclick="window.open(this.src)"></div>`;
                } else if (url.match(/\.(mp4|webm|mov)/i)) {
                    content += `<div class="message-media"><video src="${url}" controls></video></div>`;
                } else {
                    content += `<a href="${url}" download class="file-link">📄 ${file.name}</a>`;
                }
            });
        }
        content += `<div class="message-time">${message.time || getMskTime()}</div>`;
        div.innerHTML = content;
        messagesArea.appendChild(div);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function clearMessages() {
        messagesArea.innerHTML = '';
        const sysDiv = document.createElement('div');
        sysDiv.className = 'system-message';
        sysDiv.textContent = 'Добро пожаловать в Modern Messenger';
        messagesArea.appendChild(sysDiv);
    }

    // ========== ОТПРАВКА ==========
    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        
        socket.emit('message', {
            chatId: currentChatId,
            text: text,
            files: [],
            time: getMskTime()
        });
        messageInput.value = '';
        messageInput.style.height = 'auto';
    }

    async function sendWithFiles(files) {
        const text = messageInput.value.trim();
        if (!text && !files.length) return;
        
        const uploadedFiles = [];
        for (const file of files) {
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            uploadedFiles.push({ url: data.url, name: data.name });
        }
        
        socket.emit('message', {
            chatId: currentChatId,
            text: text,
            files: uploadedFiles,
            time: getMskTime()
        });
        messageInput.value = '';
        messageInput.style.height = 'auto';
    }

    // ========== ОТОБРАЖЕНИЕ СПИСКОВ ==========
    function renderUsersList() {
        usersListDiv.innerHTML = '';
        allUsers.forEach(user => {
            if (user === currentUser) return;
            const isOnline = onlineUsers.includes(user);
            const div = document.createElement('div');
            div.className = 'user-item';
            div.innerHTML = `
                <div class="item-avatar private-avatar">${user.charAt(0).toUpperCase()}</div>
                <div class="item-info">
                    <div class="item-name">
                        ${escapeHtml(user)}
                        ${isOnline ? '<span class="online-dot"></span>' : ''}
                    </div>
                    <div class="item-preview">${isOnline ? 'онлайн' : 'офлайн'}</div>
                </div>
            `;
            div.onclick = () => {
                // Автоматически создаём личный чат при клике
                const existingChat = userChats.find(c => c.name === user && c.type === 'private');
                if (existingChat) {
                    switchToChat(existingChat.id, existingChat);
                } else {
                    // Создаём новый чат отправкой сообщения
                    currentChatId = null;
                    chatTitle.textContent = user;
                    chatSubtitle.textContent = 'Личный чат';
                    clearMessages();
                    // Отправляем первое сообщение для создания чата
                    socket.emit('message', {
                        chatId: 'temp',
                        to: user,
                        text: '',
                        files: [],
                        time: getMskTime()
                    });
                }
                closeMobileMenu();
            };
            usersListDiv.appendChild(div);
        });
    }

    function renderChatsList() {
        chatsListDiv.innerHTML = '';
        if (userChats.length === 0) {
            chatsListDiv.innerHTML = '<div style="padding: 12px; color: var(--text-secondary); font-size: 0.75rem;">Нет чатов</div>';
            return;
        }
        userChats.forEach(chat => {
            const isActive = currentChatId === chat.id;
            const div = document.createElement('div');
            div.className = `chat-item ${isActive ? 'active' : ''}`;
            const avatarClass = chat.type === 'group' ? 'group-avatar' : 'private-avatar';
            const displayName = chat.type === 'group' ? chat.name : chat.name;
            const lastText = chat.lastMessage ? (chat.lastMessage.text ? chat.lastMessage.text.substring(0, 30) : 'Файл') : 'Нет сообщений';
            div.innerHTML = `
                <div class="item-avatar ${avatarClass}">${displayName.charAt(0).toUpperCase()}</div>
                <div class="item-info">
                    <div class="item-name">${escapeHtml(displayName)}</div>
                    <div class="item-preview">${escapeHtml(lastText)}</div>
                </div>
            `;
            div.onclick = () => {
                switchToChat(chat.id, chat);
                closeMobileMenu();
            };
            chatsListDiv.appendChild(div);
        });
    }

    function switchToChat(chatId, chatInfo) {
        currentChatId = chatId;
        currentChatInfo = chatInfo;
        const displayName = chatInfo.type === 'group' ? chatInfo.name : chatInfo.name;
        chatTitle.textContent = displayName;
        if (chatInfo.type === 'group') {
            chatSubtitle.textContent = `Группа • ${chatInfo.participants ? chatInfo.participants.length : 0} участников`;
            chatActions.style.display = 'flex';
        } else if (chatInfo.type === 'private') {
            const isOnline = onlineUsers.includes(chatInfo.name);
            chatSubtitle.textContent = isOnline ? 'онлайн' : 'офлайн';
            chatActions.style.display = 'none';
        } else {
            chatSubtitle.textContent = 'Все участники видят сообщения';
            chatActions.style.display = 'none';
        }
        clearMessages();
        socket.emit('get_chat_history', chatId);
        renderChatsList();
    }

    function updatePublicChat() {
        currentChatId = 'public';
        currentChatInfo = { type: 'public', name: 'Общий чат' };
        chatTitle.textContent = 'Общий чат';
        chatSubtitle.textContent = 'Все участники видят сообщения';
        chatActions.style.display = 'none';
        clearMessages();
        socket.emit('get_chat_history', 'public');
        renderChatsList();
        closeMobileMenu();
    }

    function closeMobileMenu() {
        if (window.innerWidth <= 768) {
            sidebar.classList.remove('open');
            menuOverlay.classList.remove('open');
        }
    }

    // ========== ГРУППЫ ==========
    function openCreateGroupModal() {
        modalGroupName.value = groupNameInput.value || '';
        // Заполняем список пользователей
        participantList.innerHTML = '';
        allUsers.forEach(user => {
            if (user === currentUser) return;
            const div = document.createElement('div');
            div.className = 'participant-item';
            div.innerHTML = `
                <input type="checkbox" value="${escapeHtml(user)}" id="user_${escapeHtml(user)}">
                <label for="user_${escapeHtml(user)}">${escapeHtml(user)}</label>
            `;
            participantList.appendChild(div);
        });
        createGroupModal.classList.add('active');
    }

    function createGroup() {
        const groupName = modalGroupName.value.trim();
        if (!groupName) {
            alert('Введите название группы');
            return;
        }
        const selectedUsers = [];
        const checkboxes = participantList.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(cb => {
            if (cb.checked) {
                selectedUsers.push(cb.value);
            }
        });
        socket.emit('create_group', { name: groupName, participants: selectedUsers });
        createGroupModal.classList.remove('active');
        groupNameInput.value = '';
    }

    function openAddMemberModal() {
        if (!currentChatInfo || currentChatInfo.type !== 'group') return;
        addMemberList.innerHTML = '';
        allUsers.forEach(user => {
            if (user === currentUser) return;
            if (currentChatInfo.participants && currentChatInfo.participants.includes(user)) return;
            const div = document.createElement('div');
            div.className = 'participant-item';
            div.innerHTML = `
                <input type="checkbox" value="${escapeHtml(user)}" id="add_${escapeHtml(user)}">
                <label for="add_${escapeHtml(user)}">${escapeHtml(user)}</label>
            `;
            addMemberList.appendChild(div);
        });
        addMemberModal.classList.add('active');
    }

    function addMembersToGroup() {
        const selectedUsers = [];
        const checkboxes = addMemberList.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(cb => {
            if (cb.checked) {
                selectedUsers.push(cb.value);
            }
        });
        selectedUsers.forEach(user => {
            socket.emit('add_to_group', { chatId: currentChatId, username: user });
        });
        addMemberModal.classList.remove('active');
    }

    function openChatInfoModal() {
        if (!currentChatInfo) return;
        if (currentChatInfo.type === 'group') {
            infoModalTitle.textContent = currentChatInfo.name;
            infoModalContent.innerHTML = `
                <p><strong>Тип:</strong> Группа</p>
                <p><strong>Участники (${currentChatInfo.participants ? currentChatInfo.participants.length : 0}):</strong></p>
                <ul style="margin-left: 20px; margin-top: 8px;">
                    ${currentChatInfo.participants ? currentChatInfo.participants.map(p => `<li>${escapeHtml(p)}${p === currentUser ? ' (Вы)' : ''}${onlineUsers.includes(p) ? ' 🟢' : ' ⚫'}</li>`).join('') : ''}
                </ul>
                <p><strong>Создан:</strong> ${new Date(currentChatInfo.createdAt).toLocaleString()}</p>
            `;
        } else if (currentChatInfo.type === 'private') {
            infoModalTitle.textContent = currentChatInfo.name;
            const isOnline = onlineUsers.includes(currentChatInfo.name);
            infoModalContent.innerHTML = `
                <p><strong>Тип:</strong> Личный чат</p>
                <p><strong>Собеседник:</strong> ${escapeHtml(currentChatInfo.name)}</p>
                <p><strong>Статус:</strong> ${isOnline ? 'Онлайн 🟢' : 'Офлайн ⚫'}</p>
            `;
        }
        chatInfoModal.classList.add('active');
    }

    // ========== СОКЕТ ==========
    function initSocket() {
        socket = io();
        
        socket.on('connect', () => {
            socket.emit('register', { username: currentUser, color: colorPicker.value, bio: userBio });
        });
        
        socket.on('all_users', (users) => {
            allUsers = users;
            renderUsersList();
        });
        
        socket.on('online_users', (users) => {
            onlineUsers = users;
            renderUsersList();
            if (currentChatInfo && currentChatInfo.type === 'private') {
                const isOnline = onlineUsers.includes(currentChatInfo.name);
                chatSubtitle.textContent = isOnline ? 'онлайн' : 'офлайн';
            }
        });
        
        socket.on('history', (messages) => {
            if (currentChatId === 'public') {
                clearMessages();
                messages.forEach(msg => addMessageToUI(msg, msg.from === currentUser));
            }
        });
        
        socket.on('chat_history', (data) => {
            if (currentChatId === data.chatId) {
                clearMessages();
                data.messages.forEach(msg => addMessageToUI(msg, msg.from === currentUser));
                if (data.chatInfo) {
                    currentChatInfo = data.chatInfo;
                    if (data.chatInfo.type === 'group') {
                        chatSubtitle.textContent = `Группа • ${data.chatInfo.participants.length} участников`;
                    }
                }
            }
        });
        
        socket.on('new_message', (data) => {
            if (currentChatId === data.chatId) {
                addMessageToUI(data.message, data.message.from === currentUser);
            }
            if (data.message.from !== currentUser && !document.hasFocus()) {
                const chat = userChats.find(c => c.id === data.chatId);
                const chatName = chat ? (chat.type === 'group' ? chat.name : chat.name) : 'Новое сообщение';
                showNotification(chatName, data.message.text || 'Файл');
                updateUnreadCount();
            }
            socket.emit('get_chats');
        });
        
        socket.on('chats_list', (chats) => {
            userChats = chats;
            renderChatsList();
        });
        
        socket.on('group_created', (data) => {
            alert(`Группа "${data.name}" создана!`);
            socket.emit('get_chats');
        });
        
        socket.on('added_to_group', (data) => {
            alert(`Вы добавлены в группу "${data.groupName}"`);
            socket.emit('get_chats');
        });
        
        socket.on('group_member_added', (data) => {
            if (currentChatId === data.chatId) {
                socket.emit('get_chat_history', currentChatId);
            }
            socket.emit('get_chats');
        });
        
        socket.on('user_joined', (text) => {
            const sysDiv = document.createElement('div');
            sysDiv.className = 'system-message';
            sysDiv.textContent = text;
            messagesArea.appendChild(sysDiv);
            setTimeout(() => sysDiv.remove(), 4000);
        });
        
        socket.on('user_left', (text) => {
            const sysDiv = document.createElement('div');
            sysDiv.className = 'system-message';
            sysDiv.textContent = text;
            messagesArea.appendChild(sysDiv);
            setTimeout(() => sysDiv.remove(), 4000);
        });
    }

    // ========== УТИЛИТЫ ==========
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== ОБРАБОТЧИКИ ==========
    function setupEventHandlers() {
        sendBtn.onclick = sendMessage;
        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        fileBtn.onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.multiple = true;
            input.onchange = (e) => sendWithFiles(Array.from(e.target.files));
            input.click();
        };
        
        imageBtn.onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,video/*';
            input.multiple = true;
            input.onchange = (e) => sendWithFiles(Array.from(e.target.files));
            input.click();
        };
        
        profileBtn.onclick = () => {
            editName.value = currentUser;
            editBio.value = userBio;
            profileModal.classList.add('active');
        };
        
        saveProfileBtn.onclick = saveProfile;
        closeModalBtn.onclick = () => profileModal.classList.remove('active');
        
        publicChatBtn.onclick = updatePublicChat;
        
        createGroupBtn.onclick = openCreateGroupModal;
        closeGroupModalBtn.onclick = () => createGroupModal.classList.remove('active');
        confirmCreateGroupBtn.onclick = createGroup;
        
        addMemberBtn.onclick = openAddMemberModal;
        closeAddMemberBtn.onclick = () => addMemberModal.classList.remove('active');
        confirmAddMemberBtn.onclick = addMembersToGroup;
        
        infoBtn.onclick = openChatInfoModal;
        closeInfoModalBtn.onclick = () => chatInfoModal.classList.remove('active');
        
        if (mobileMenuBtn) {
            mobileMenuBtn.onclick = () => {
                sidebar.classList.toggle('open');
                menuOverlay.classList.toggle('open');
            };
        }
        if (menuOverlay) {
            menuOverlay.onclick = () => {
                sidebar.classList.remove('open');
                menuOverlay.classList.remove('open');
            };
        }
        
        window.onclick = (e) => {
            if (e.target === profileModal) profileModal.classList.remove('active');
            if (e.target === createGroupModal) createGroupModal.classList.remove('active');
            if (e.target === addMemberModal) addMemberModal.classList.remove('active');
            if (e.target === chatInfoModal) chatInfoModal.classList.remove('active');
        };
    }

    // ========== ЗАПУСК ==========
    loadProfile();
    loadTheme();
    initSocket();
    setupEventHandlers();
    
    setInterval(() => {
        if (socket && socket.connected) {
            socket.emit('get_chats');
        }
    }, 5000);
</script>
</body>
</html>
