<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Modern Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #0f0f1a;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* Основной контейнер */
        .app-container {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* Боковая панель - десктопная версия */
        .sidebar {
            width: 320px;
            background: #1a1a2e;
            border-right: 1px solid #2a2a3e;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            z-index: 20;
        }

        /* Мобильное меню (выдвижное) */
        .mobile-menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 25;
            backdrop-filter: blur(4px);
        }

        .mobile-menu-overlay.active {
            display: block;
        }

        .sidebar.mobile-open {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            transform: translateX(0);
            z-index: 30;
            box-shadow: 4px 0 20px rgba(0,0,0,0.5);
        }

        /* Кнопка меню для мобильных */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            width: 44px;
            height: 44px;
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 15;
            backdrop-filter: blur(10px);
            color: white;
            font-size: 1.4rem;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid #2a2a3e;
            background: linear-gradient(135deg, #1e1e2e 0%, #16162a 100%);
        }

        .sidebar-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sidebar-header p {
            font-size: 0.8rem;
            color: #6c6c8e;
            margin-top: 4px;
        }

        .profile-card {
            padding: 20px;
            background: #16162a;
            margin: 16px;
            border-radius: 20px;
            border: 1px solid #2a2a3e;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .profile-card:hover {
            background: #1e1e32;
            transform: translateY(-2px);
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .profile-avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .profile-details h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            word-break: break-word;
        }

        .profile-details p {
            font-size: 0.8rem;
            color: #8a8aaa;
            margin-top: 4px;
            word-break: break-word;
        }

        .profile-status {
            font-size: 0.7rem;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }

        .profile-status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .notification-toggle {
            background: #16162a;
            margin: 8px 16px 16px 16px;
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid #2a2a3e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        .notification-toggle:hover {
            background: #1e1e32;
        }

        .notification-toggle .toggle-switch {
            width: 44px;
            height: 24px;
            background: #2a2a3e;
            border-radius: 24px;
            position: relative;
            transition: all 0.3s ease;
        }

        .notification-toggle .toggle-switch.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .notification-toggle .toggle-switch::after {
            content: '';
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: all 0.3s ease;
        }

        .notification-toggle .toggle-switch.active::after {
            left: 22px;
        }

        /* Чат область */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f1a;
            min-width: 0;
            position: relative;
        }

        .chat-header {
            padding: 16px 20px;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a3e;
        }

        .chat-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 85%;
            padding: 8px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }

        .message.own {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            background: #1e1e32;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-username {
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .message-text {
            font-size: 0.9rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .message-time {
            font-size: 0.6rem;
            text-align: right;
            margin-top: 6px;
            opacity: 0.6;
        }

        .message-media {
            margin-top: 8px;
            border-radius: 12px;
            overflow: hidden;
        }

        .message-media img,
        .message-media video {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
        }

        .file-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 6px 10px;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .input-area {
            background: #1a1a2e;
            padding: 12px 16px;
            border-top: 1px solid #2a2a3e;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            background: #16162a;
            border-radius: 24px;
            padding: 10px 16px;
            border: 1px solid #2a2a3e;
        }

        .input-wrapper:focus-within {
            border-color: #667eea;
        }

        #messageInput {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 0.9rem;
            font-family: inherit;
            resize: none;
            outline: none;
        }

        .action-buttons {
            display: flex;
            gap: 6px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            background: #16162a;
            border: 1px solid #2a2a3e;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8a8aaa;
            font-size: 1.1rem;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            font-weight: 600;
            padding: 0 20px;
            border-radius: 40px;
            cursor: pointer;
            height: 40px;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
        }

        .modal-content h3 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .modal-field {
            margin-bottom: 16px;
        }

        .modal-field label {
            display: block;
            font-size: 0.8rem;
            color: #8a8aaa;
            margin-bottom: 6px;
        }

        .modal-field input,
        .modal-field textarea {
            width: 100%;
            padding: 10px 14px;
            background: #16162a;
            border: 1px solid #2a2a3e;
            border-radius: 14px;
            color: white;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .save-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .cancel-btn {
            background: #2a2a3e;
            color: #8a8aaa;
        }

        .system-message {
            text-align: center;
            font-size: 0.7rem;
            color: #6c6c8e;
            padding: 6px;
            margin: 4px auto;
        }

        .permission-request {
            background: #16162a;
            margin: 8px 16px;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.7rem;
            color: #ffaa44;
            border: 1px solid #ffaa44;
            cursor: pointer;
        }

        /* Скроллбар */
        .messages-container::-webkit-scrollbar {
            width: 4px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: #2a2a3e;
            border-radius: 4px;
        }

        /* Мобильные стили */
        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: flex;
            }
            
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                width: 280px;
                z-index: 30;
            }
            
            .chat-header {
                padding: 12px 16px;
                padding-left: 60px;
            }
            
            .chat-header h2 {
                font-size: 1rem;
            }
            
            .messages-container {
                padding: 12px;
            }
            
            .message {
                max-width: 90%;
                padding: 8px 12px;
            }
            
            .message-text {
                font-size: 0.85rem;
            }
            
            .input-area {
                padding: 10px 12px;
            }
            
            .action-btn {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
            
            .send-btn {
                padding: 0 16px;
                height: 36px;
                font-size: 0.85rem;
            }
            
            .profile-card {
                margin: 12px;
                padding: 14px;
            }
            
            .profile-avatar {
                width: 48px;
                height: 48px;
                font-size: 1.4rem;
            }
            
            .profile-details h3 {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<!-- Кнопка меню для телефона -->
<button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
<div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>

<div class="app-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>Modern Messenger</h1>
            <p>Связь без границ</p>
        </div>
        <div class="profile-card" id="profileCard">
            <div class="profile-info">
                <div class="profile-avatar" id="avatarDisplay">U</div>
                <div class="profile-details">
                    <h3 id="profileName">Пользователь</h3>
                    <div class="profile-status">Онлайн</div>
                    <p id="profileBio">Нажми для редактирования</p>
                </div>
            </div>
        </div>
        <div class="notification-toggle" id="notificationToggle">
            <span>Уведомления</span>
            <div class="toggle-switch" id="toggleSwitch"></div>
        </div>
        <div class="permission-request" id="permissionRequest" style="display: none;">
            Нажмите, чтобы включить уведомления
        </div>
        <div style="flex:1"></div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <h2>Общий чат</h2>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div class="system-message">Добро пожаловать в Modern Messenger</div>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="messageInput" rows="1" placeholder="Введите сообщение..."></textarea>
            </div>
            <div class="action-buttons">
                <button class="action-btn" id="fileBtn">📎</button>
                <button class="action-btn" id="imageBtn">🖼️</button>
                <button class="send-btn" id="sendBtn">Отправить</button>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="profileModal">
    <div class="modal-content">
        <h3>Редактирование профиля</h3>
        <div class="modal-field">
            <label>Имя пользователя</label>
            <input type="text" id="editName" maxlength="30">
        </div>
        <div class="modal-field">
            <label>Статус / О себе</label>
            <textarea id="editBio" rows="3" maxlength="100" placeholder="Расскажите о себе..."></textarea>
        </div>
        <div class="modal-field">
            <label>Аватар (цвет)</label>
            <input type="color" id="editColor" value="#667eea">
        </div>
        <div class="modal-buttons">
            <button class="cancel-btn" id="closeModalBtn">Отмена</button>
            <button class="save-btn" id="saveProfileBtn">Сохранить</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let socket = null;
    let currentUser = '';
    let userAvatarColor = '#667eea';
    let userBio = '';
    let notificationsEnabled = false;
    let notificationPermissionGranted = false;
    let unreadCount = 0;
    let originalTitle = document.title;

    // DOM элементы
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileBtn = document.getElementById('fileBtn');
    const imageBtn = document.getElementById('imageBtn');
    const profileCard = document.getElementById('profileCard');
    const profileModal = document.getElementById('profileModal');
    const editName = document.getElementById('editName');
    const editBio = document.getElementById('editBio');
    const editColor = document.getElementById('editColor');
    const saveProfileBtn = document.getElementById('saveProfileBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const avatarDisplay = document.getElementById('avatarDisplay');
    const profileNameSpan = document.getElementById('profileName');
    const profileBioSpan = document.getElementById('profileBio');
    const notificationToggle = document.getElementById('notificationToggle');
    const toggleSwitch = document.getElementById('toggleSwitch');
    const permissionRequest = document.getElementById('permissionRequest');
    
    // Мобильное меню
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenuOverlay = document.getElementById('mobileMenuOverlay');
    const sidebar = document.getElementById('sidebar');

    function closeMobileMenu() {
        sidebar.classList.remove('mobile-open');
        mobileMenuOverlay.classList.remove('active');
    }

    function openMobileMenu() {
        sidebar.classList.add('mobile-open');
        mobileMenuOverlay.classList.add('active');
    }

    if (mobileMenuBtn) {
        mobileMenuBtn.onclick = openMobileMenu;
    }
    
    if (mobileMenuOverlay) {
        mobileMenuOverlay.onclick = closeMobileMenu;
    }

    // Закрываем меню при клике на профиль (на телефоне)
    profileCard.onclick = () => {
        if (window.innerWidth <= 768) {
            closeMobileMenu();
        }
        editName.value = currentUser;
        editBio.value = userBio;
        editColor.value = userAvatarColor;
        profileModal.classList.add('active');
    };

    function getMskTime() {
        const now = new Date();
        const mskOffset = 3 * 60 * 60 * 1000;
        const mskTime = new Date(now.getTime() + mskOffset);
        return mskTime.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }

    function loadProfile() {
        const savedName = localStorage.getItem('profile_name');
        const savedBio = localStorage.getItem('profile_bio');
        const savedColor = localStorage.getItem('profile_color');
        const savedNotifications = localStorage.getItem('notifications_enabled');
        
        if (savedName) {
            currentUser = savedName;
            profileNameSpan.textContent = currentUser;
            editName.value = currentUser;
        }
        if (savedBio) {
            userBio = savedBio;
            profileBioSpan.textContent = userBio || 'Нажми для редактирования';
            editBio.value = userBio;
        }
        if (savedColor) {
            userAvatarColor = savedColor;
            editColor.value = savedColor;
            avatarDisplay.style.background = userAvatarColor;
        }
        if (savedNotifications === 'true') {
            notificationsEnabled = true;
            toggleSwitch.classList.add('active');
        }
        
        const initial = currentUser ? currentUser.charAt(0).toUpperCase() : 'U';
        avatarDisplay.textContent = initial;
    }

    function saveProfile() {
        const newName = editName.value.trim();
        if (!newName) {
            alert('Введите имя');
            return;
        }
        
        currentUser = newName;
        userBio = editBio.value;
        userAvatarColor = editColor.value;
        
        localStorage.setItem('profile_name', currentUser);
        localStorage.setItem('profile_bio', userBio);
        localStorage.setItem('profile_color', userAvatarColor);
        
        profileNameSpan.textContent = currentUser;
        profileBioSpan.textContent = userBio || 'Нажми для редактирования';
        avatarDisplay.style.background = userAvatarColor;
        avatarDisplay.textContent = currentUser.charAt(0).toUpperCase();
        
        profileModal.classList.remove('active');
        
        if (socket && socket.connected) {
            socket.emit('register', currentUser);
        }
    }

    async function requestNotificationPermission() {
        if (!('Notification' in window)) return false;
        if (Notification.permission === 'granted') {
            notificationPermissionGranted = true;
            permissionRequest.style.display = 'none';
            return true;
        }
        if (Notification.permission !== 'denied') {
            const permission = await Notification.requestPermission();
            notificationPermissionGranted = permission === 'granted';
            if (notificationPermissionGranted) permissionRequest.style.display = 'none';
            return notificationPermissionGranted;
        }
        permissionRequest.style.display = 'block';
        return false;
    }

    function showNotification(title, body, tag) {
        if (!notificationsEnabled || !notificationPermissionGranted) return;
        if (document.hasFocus()) return;
        try {
            const notification = new Notification(title, {
                body: body,
                silent: false,
                tag: tag || 'message'
            });
            notification.onclick = () => { window.focus(); notification.close(); };
            setTimeout(() => notification.close(), 5000);
        } catch(e) {}
    }

    function updateUnreadCount() {
        if (!document.hasFocus()) {
            unreadCount++;
            document.title = `(${unreadCount}) Modern Messenger`;
        }
    }

    function resetUnreadCount() {
        unreadCount = 0;
        document.title = originalTitle;
    }

    window.addEventListener('focus', resetUnreadCount);

    saveProfileBtn.onclick = saveProfile;
    closeModalBtn.onclick = () => profileModal.classList.remove('active');

    notificationToggle.onclick = async () => {
        if (!notificationPermissionGranted) {
            const granted = await requestNotificationPermission();
            if (!granted) {
                alert('Разрешите уведомления в настройках браузера');
                return;
            }
        }
        notificationsEnabled = !notificationsEnabled;
        if (notificationsEnabled) {
            toggleSwitch.classList.add('active');
            localStorage.setItem('notifications_enabled', 'true');
        } else {
            toggleSwitch.classList.remove('active');
            localStorage.setItem('notifications_enabled', 'false');
        }
    };

    permissionRequest.onclick = async () => { await requestNotificationPermission(); };

    function initSocket() {
        socket = io();
        socket.on('connect', () => { socket.emit('register', currentUser); });
        socket.on('history', (msgs) => {
            messagesContainer.innerHTML = '';
            if (msgs.length === 0) {
                messagesContainer.innerHTML = '<div class="system-message">Добро пожаловать в Modern Messenger</div>';
            }
            msgs.forEach(msg => addMessageToUI(msg, msg.username === currentUser));
            resetUnreadCount();
        });
        socket.on('message', (msg) => {
            const isOwn = msg.username === currentUser;
            addMessageToUI(msg, isOwn);
            if (!isOwn && !document.hasFocus()) {
                showNotification(msg.username, msg.text || 'Отправил(а) файл', msg.id);
                updateUnreadCount();
            }
        });
        socket.on('user_joined', (text) => {
            const sysDiv = document.createElement('div');
            sysDiv.className = 'system-message';
            sysDiv.textContent = text;
            messagesContainer.appendChild(sysDiv);
            setTimeout(() => sysDiv.remove(), 4000);
            if (!document.hasFocus()) showNotification('Modern Messenger', text, 'system');
        });
        socket.on('user_left', (text) => {
            const sysDiv = document.createElement('div');
            sysDiv.className = 'system-message';
            sysDiv.textContent = text;
            messagesContainer.appendChild(sysDiv);
            setTimeout(() => sysDiv.remove(), 4000);
        });
    }
    
    function addMessageToUI(msg, isOwn) {
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'own' : 'other'}`;
        let content = '';
        if (!isOwn) content += `<div class="message-username">${escapeHtml(msg.username)}</div>`;
        if (msg.text) content += `<div class="message-text">${escapeHtml(msg.text)}</div>`;
        if (msg.files && msg.files.length) {
            msg.files.forEach(file => {
                const url = file.url;
                if (url.match(/\.(jpg|jpeg|png|gif|webp)/i)) {
                    content += `<div class="message-media"><img src="${url}" alt="image" onclick="window.open(this.src)"></div>`;
                } else if (url.match(/\.(mp4|webm|mov)/i)) {
                    content += `<div class="message-media"><video src="${url}" controls></video></div>`;
                } else {
                    content += `<a href="${url}" download class="file-link">📄 ${file.name}</a>`;
                }
            });
        }
        content += `<div class="message-time">${msg.time || getMskTime()}</div>`;
        div.innerHTML = content;
        messagesContainer.appendChild(div);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function sendWithFiles(files) {
        const text = messageInput.value.trim();
        if (!text && !files.length) return;
        const uploadedFiles = [];
        for (const file of files) {
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            uploadedFiles.push({ url: data.url, name: data.name });
        }
        socket.emit('message', { text: text, files: uploadedFiles, time: getMskTime() });
        messageInput.value = '';
        messageInput.style.height = 'auto';
    }
    
    sendBtn.onclick = () => sendWithFiles([]);
    messageInput.onkeypress = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendWithFiles([]);
        }
    };
    messageInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });
    
    fileBtn.onclick = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.multiple = true;
        input.onchange = (e) => sendWithFiles(Array.from(e.target.files));
        input.click();
    };
    imageBtn.onclick = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,video/*';
        input.multiple = true;
        input.onchange = (e) => sendWithFiles(Array.from(e.target.files));
        input.click();
    };
    
    loadProfile();
    requestNotificationPermission();
    initSocket();
    
    window.onclick = (e) => {
        if (e.target === profileModal) profileModal.classList.remove('active');
    };
</script>
</body>
</html>
