<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e" id="themeColorMeta">
    <title>Modern Messenger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ============ СВЕТЛАЯ ТЕМА (по умолчанию) ============ */
        :root {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f0;
            --bg-hover: #e8e8e8;
            --border-color: #e0e0e0;
            --text-primary: #1a1a2e;
            --text-secondary: #666666;
            --text-muted: #999999;
            --accent: #667eea;
            --accent-dark: #5a67d8;
            --accent-light: #7f9cf5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --message-own: #667eea;
            --message-other: #e8e8e8;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
        }

        /* ============ ТЁМНАЯ ТЕМА ============ */
        body.dark {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16162a;
            --bg-hover: #1e1e32;
            --border-color: #2a2a3e;
            --text-primary: #ffffff;
            --text-secondary: #8a8aaa;
            --text-muted: #6c6c8e;
            --accent: #667eea;
            --accent-dark: #5a67d8;
            --accent-light: #7f9cf5;
            --success: #4ade80;
            --danger: #f56565;
            --warning: #fbbf24;
            --message-own: #667eea;
            --message-other: #1e1e32;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.3);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* ============ АНИМАЦИИ ============ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInLeft {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* ============ ОСНОВНЫЕ СТИЛИ ============ */
        .app {
            display: flex;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        /* ============ ЭКРАН ВХОДА ============ */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .auth-container {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: var(--shadow-lg);
            animation: fadeIn 0.3s ease;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .auth-logo p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.2s;
            position: relative;
        }

        .auth-tab.active {
            color: var(--accent);
        }

        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .auth-form.hidden {
            display: none;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            flex: 1;
            padding: 14px 46px 14px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        .password-wrapper input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1.1rem;
            user-select: none;
        }

        .auth-btn {
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .auth-btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .auth-error {
            background: rgba(239,68,68,0.1);
            border: 1px solid var(--danger);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--danger);
        }

        /* ============ БОКОВАЯ ПАНЕЛЬ ============ */
        .sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .sidebar-profile {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar-profile:hover {
            background: var(--bg-hover);
        }

        .profile-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            position: relative;
        }

        .profile-avatar.online::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--bg-secondary);
        }

        .profile-info {
            flex: 1;
            min-width: 0;
        }

        .profile-name {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .profile-status {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* Поиск */
        .search-container {
            padding: 12px 16px;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 9999px;
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Секции */
        .section-header {
            padding: 16px 16px 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section-action {
            font-size: 0.7rem;
            color: var(--accent);
            cursor: pointer;
        }

        /* Список чатов */
        .chats-list, .contacts-list {
            overflow-y: auto;
        }

        .chat-item, .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover, .contact-item:hover {
            background: var(--bg-hover);
        }

        .chat-item.active {
            background: var(--bg-tertiary);
            border-left: 3px solid var(--accent);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            position: relative;
        }

        .chat-avatar.online::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--bg-secondary);
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 500;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-preview {
            font-size: 0.75rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-meta {
            text-align: right;
            flex-shrink: 0;
        }

        .chat-time {
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .chat-badge {
            background: var(--accent);
            color: white;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 9999px;
            margin-top: 4px;
        }

        /* ============ ОСНОВНАЯ ОБЛАСТЬ ЧАТА ============ */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            min-width: 0;
            height: 100%;
        }

        .chat-header {
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 600;
            color: white;
        }

        .chat-header-details h2 {
            font-size: 1rem;
            font-weight: 600;
        }

        .chat-header-details p {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .typing-indicator {
            font-size: 0.7rem;
            color: var(--accent);
            font-style: italic;
        }

        .chat-actions {
            display: flex;
            gap: 8px;
        }

        .chat-action-btn {
            width: 36px;
            height: 36px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .chat-action-btn:hover {
            background: var(--bg-hover);
            color: var(--accent);
        }

        /* Область сообщений */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            position: relative;
        }

        .message.own {
            background: var(--message-own);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            background: var(--message-other);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-sender {
            font-size: 0.65rem;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.7;
        }

        .message-text {
            font-size: 0.9rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .message-time {
            font-size: 0.55rem;
            text-align: right;
            margin-top: 4px;
            opacity: 0.6;
        }

        .message-status {
            font-size: 0.55rem;
            margin-left: 6px;
        }

        /* Медиа в сообщениях */
        .message-media {
            margin-top: 8px;
            border-radius: 12px;
            overflow: hidden;
        }

        .message-media img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            cursor: pointer;
        }

        .message-media video {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
        }

        .file-message {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 8px 12px;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            font-size: 0.8rem;
            margin-top: 4px;
        }

        /* Системные сообщения */
        .system-message {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 6px;
            margin: 4px auto;
        }

        /* Индикатор печати */
        .typing-animation {
            display: inline-flex;
            gap: 4px;
            align-items: center;
        }

        .typing-animation span {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-animation span:nth-child(2) { animation-delay: 0.2s; }
        .typing-animation span:nth-child(3) { animation-delay: 0.4s; }

        /* Область ввода */
        .input-area {
            background: var(--bg-secondary);
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .attach-btn {
            width: 42px;
            height: 42px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .attach-btn:hover {
            background: var(--bg-hover);
            color: var(--accent);
        }

        .input-wrapper {
            flex: 1;
            background: var(--bg-tertiary);
            border-radius: 24px;
            padding: 10px 16px;
            border: 1px solid var(--border-color);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
        }

        #messageInput {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            resize: none;
            outline: none;
        }

        .send-btn {
            width: 42px;
            height: 42px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: var(--accent-dark);
            transform: scale(1.02);
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 24px;
            width: 90%;
            max-width: 480px;
            max-height: 80vh;
            overflow-y: auto;
            animation: fadeIn 0.2s ease;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* Кнопки */
        .btn-primary {
            padding: 10px 20px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-secondary {
            padding: 10px 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            cursor: pointer;
        }

        /* Переключатель темы */
        .theme-switch {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .theme-switch-label {
            font-size: 0.85rem;
            color: var(--text-primary);
        }

        .theme-toggle {
            width: 50px;
            height: 26px;
            background: var(--bg-tertiary);
            border-radius: 9999px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
            border: 1px solid var(--border-color);
        }

        .theme-toggle.active {
            background: var(--accent);
        }

        .theme-toggle::after {
            content: '';
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 1px;
            left: 2px;
            transition: all 0.3s;
        }

        .theme-toggle.active::after {
            left: 26px;
        }

        /* Мобильная версия */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 30;
                width: 280px;
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .mobile-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 25;
            }
            
            .mobile-overlay.open {
                display: block;
            }
            
            .mobile-menu-btn {
                position: fixed;
                top: 14px;
                left: 14px;
                width: 40px;
                height: 40px;
                background: var(--bg-secondary);
                border: 1px solid var(--border-color);
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                z-index: 15;
                color: var(--text-primary);
                font-size: 1.2rem;
            }
            
            .chat-header {
                padding: 12px 16px;
                padding-left: 60px;
            }
            
            .message {
                max-width: 85%;
            }
            
            .sidebar-profile {
                padding: 16px;
            }
        }

        @media (min-width: 769px) {
            .mobile-menu-btn, .mobile-overlay {
                display: none;
            }
        }

        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="auth-screen" id="authScreen">
    <div class="auth-container">
        <div class="auth-logo">
            <h1>Modern Messenger</h1>
            <p>Быстро. Безопасно. Удобно.</p>
        </div>
        
        <div class="auth-tabs">
            <div class="auth-tab active" data-tab="login">Вход</div>
            <div class="auth-tab" data-tab="register">Регистрация</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // ============ ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ============
    let socket = null;
    let currentUser = null;
    let currentChatId = null;
    let currentChat = null;
    let allUsers = [];
    let userChats = [];
    let typingTimeout = null;
    let isTyping = false;
    let pendingFiles = [];
    
    // DOM элементы
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const messagesArea = document.getElementById('messagesArea');
    const chatsListDiv = document.getElementById('chatsList');
    const contactsListDiv = document.getElementById('contactsList');
    const searchInput = document.getElementById('searchInput');
    const themeToggle = document.getElementById('themeToggle');
    
    // ============ ТЕМА ============
    function loadTheme() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            themeToggle.classList.add('active');
        } else {
            document.body.classList.remove('dark');
            themeToggle.classList.remove('active');
        }
    }
    
    function toggleTheme() {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            themeToggle.classList.remove('active');
            localStorage.setItem('theme', 'light');
        } else {
            document.body.classList.add('dark');
            themeToggle.classList.add('active');
            localStorage.setItem('theme', 'dark');
        }
    }
    
    themeToggle.addEventListener('click', toggleTheme);
    loadTheme();
    
    // ============ ПОКАЗАТЬ/СКРЫТЬ ПАРОЛЬ ============
    document.querySelectorAll('.toggle-password').forEach(btn => {
        btn.addEventListener('click', function() {
            const targetId = this.dataset.target;
            const input = document.getElementById(targetId);
            if (input.type === 'password') {
                input.type = 'text';
                this.textContent = '🙈';
            } else {
                input.type = 'password';
                this.textContent = '👁️';
            }
        });
    });
    
    // ============ ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ============
    function formatTime(date) {
        return new Date(date).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }
    
    function formatDate(date) {
        const now = new Date();
        const msgDate = new Date(date);
        if (msgDate.toDateString() === now.toDateString()) {
            return formatTime(date);
        }
        const diff = now - msgDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        if (days < 7) {
            const weekdays = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
            return weekdays[msgDate.getDay()];
        }
        return msgDate.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ============ ОТРИСОВКА ИНТЕРФЕЙСА ============
    function renderChats() {
        if (!chatsListDiv) return;
        
        const filteredChats = searchInput.value.trim()
            ? userChats.filter(chat => chat.name.toLowerCase().includes(searchInput.value.toLowerCase()))
            : userChats;
        
        if (filteredChats.length === 0) {
            chatsListDiv.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary); font-size: 0.8rem;">Нет чатов</div>';
            return;
        }
        
        chatsListDiv.innerHTML = filteredChats.map(chat => `
            <div class="chat-item ${currentChatId === chat.id ? 'active' : ''}" data-chat-id="${chat.id}">
                <div class="chat-avatar">${chat.name ? chat.name.charAt(0).toUpperCase() : '?'}</div>
                <div class="chat-info">
                    <div class="chat-name">${escapeHtml(chat.name || 'Чат')}</div>
                    <div class="chat-preview">${chat.lastMessage ? (chat.lastMessage.text ? escapeHtml(chat.lastMessage.text.substring(0, 40)) : 'Файл') : 'Нет сообщений'}</div>
                </div>
                <div class="chat-meta">
                    <div class="chat-time">${chat.lastMessage ? formatDate(chat.lastMessage.createdAt) : ''}</div>
                    ${chat.unread ? `<div class="chat-badge">${chat.unread}</div>` : ''}
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.chat-item').forEach(el => {
            el.addEventListener('click', () => {
                const chatId = el.dataset.chatId;
                const chat = userChats.find(c => c.id === chatId);
                if (chat) switchToChat(chatId, chat);
            });
        });
    }
    
    function renderContacts() {
        if (!contactsListDiv) return;
        
        const search = searchInput.value.trim().toLowerCase();
        const filteredUsers = allUsers.filter(user => 
            user.id !== currentUser?.id && 
            (user.name?.toLowerCase().includes(search) || user.username?.toLowerCase().includes(search))
        );
        
        if (filteredUsers.length === 0) {
            contactsListDiv.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary); font-size: 0.8rem;">Нет контактов</div>';
            return;
        }
        
        contactsListDiv.innerHTML = filteredUsers.map(user => `
            <div class="contact-item" data-user-id="${user.id}">
                <div class="chat-avatar ${user.online ? 'online' : ''}">${(user.name || user.username).charAt(0).toUpperCase()}</div>
                <div class="chat-info">
                    <div class="chat-name">${escapeHtml(user.name || user.username)}</div>
                    <div class="chat-preview">${user.online ? 'онлайн' : 'был(а) ' + formatDate(user.lastSeen)}</div>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.contact-item').forEach(el => {
            el.addEventListener('click', () => {
                const userId = el.dataset.userId;
                createPrivateChat(userId);
            });
        });
    }
    
    function renderMessages() {
        if (!messagesArea || !currentChat) return;
        
        const chatMessages = currentChat.messages || [];
        
        if (chatMessages.length === 0) {
            messagesArea.innerHTML = '<div class="system-message">Нет сообщений. Напишите что-нибудь!</div>';
            return;
        }
        
        messagesArea.innerHTML = chatMessages.map(msg => `
            <div class="message ${msg.from === currentUser?.id ? 'own' : 'other'}">
                ${msg.from !== currentUser?.id ? `<div class="message-sender">${escapeHtml(msg.fromName || 'Пользователь')}</div>` : ''}
                ${msg.text ? `<div class="message-text">${escapeHtml(msg.text)}</div>` : ''}
                ${msg.files && msg.files.length ? msg.files.map(file => {
                    if (file.url.match(/\.(jpg|jpeg|png|gif|webp)/i)) {
                        return `<div class="message-media"><img src="${file.url}" alt="image" onclick="window.open(this.src)"></div>`;
                    } else if (file.url.match(/\.(mp4|webm|mov)/i)) {
                        return `<div class="message-media"><video src="${file.url}" controls></video></div>`;
                    } else {
                        return `<a href="${file.url}" download class="file-message">📄 ${file.name}</a>`;
                    }
                }).join('') : ''}
                <div class="message-time">${formatTime(msg.createdAt)} ${msg.from === currentUser?.id ? (msg.read?.length ? '✓✓' : '✓') : ''}</div>
            </div>
        `).join('');
        
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }
    
    // ============ ПЕРЕКЛЮЧЕНИЕ ЧАТА ============
    function switchToChat(chatId, chat) {
        currentChatId = chatId;
        currentChat = chat;
        
        document.getElementById('chatName').textContent = chat.name;
        document.getElementById('chatStatus').textContent = chat.type === 'group' ? `${chat.participants?.length || 0} участников` : (chat.online ? 'онлайн' : 'офлайн');
        document.getElementById('chatAvatar').textContent = chat.name?.charAt(0).toUpperCase() || '💬';
        
        const chatActions = document.getElementById('chatActions');
        if (chat.type === 'group') {
            chatActions.style.display = 'flex';
        } else {
            chatActions.style.display = 'none';
        }
        
        document.getElementById('inputArea').style.display = 'flex';
        
        // Загружаем сообщения
        fetch(`/api/messages/${chatId}`)
            .then(res => res.json())
            .then(messages => {
                currentChat.messages = messages;
                renderMessages();
            });
        
        renderChats();
    }
    
    // ============ СОЗДАНИЕ ЧАТА ============
    function createPrivateChat(userId) {
        socket.emit('create_private_chat', { targetUserId: userId });
    }
    
    // ============ ОТПРАВКА СООБЩЕНИЯ ============
    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text && pendingFiles.length === 0) return;
        
        socket.emit('send_message', {
            chatId: currentChatId,
            text: text,
            files: pendingFiles,
            replyTo: null
        });
        
        // Оптимистичное добавление
        const tempMessage = {
            id: 'temp_' + Date.now(),
            from: currentUser.id,
            fromName: currentUser.name,
            text: text,
            files: [...pendingFiles],
            createdAt: new Date().toISOString(),
            read: []
        };
        if (!currentChat.messages) currentChat.messages = [];
        currentChat.messages.push(tempMessage);
        renderMessages();
        
        messageInput.value = '';
        pendingFiles = [];
        messageInput.style.height = 'auto';
    }
    
    // ============ ИНИЦИАЛИЗАЦИЯ СОКЕТА ============
    function initSocket() {
        socket = io();
        
        socket.on('login_success', (data) => {
            currentUser = data.user;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('sidebarName').textContent = currentUser.name || currentUser.username;
            document.getElementById('sidebarAvatarText').textContent = (currentUser.name || currentUser.username).charAt(0).toUpperCase();
            
            // Загружаем чаты
            fetch(`/api/chats/${currentUser.id}`)
                .then(res => res.json())
                .then(chats => {
                    userChats = chats;
                    renderChats();
                });
            
            // Загружаем пользователей
            fetch('/api/users')
                .then(res => res.json())
                .then(users => {
                    allUsers = users;
                    renderContacts();
                });
        });
        
        socket.on('login_error', (data) => {
            document.getElementById('loginError').textContent = data.error;
            document.getElementById('loginError').style.display = 'block';
        });
        
        socket.on('users_list', (users) => {
            allUsers = users;
            renderContacts();
        });
        
        socket.on('user_status', (data) => {
            const user = allUsers.find(u => u.id === data.userId);
            if (user) {
                user.online = data.online;
                user.lastSeen = data.lastSeen;
                renderContacts();
                if (currentChat?.type === 'private' && currentChat.participants?.includes(data.userId)) {
                    document.getElementById('chatStatus').textContent = data.online ? 'онлайн' : 'был(а) ' + formatDate(data.lastSeen);
                }
            }
        });
        
        socket.on('chats_list', (chats) => {
            userChats = chats;
            renderChats();
        });
        
        socket.on('chat_created', (data) => {
            fetch(`/api/chats/${currentUser.id}`)
                .then(res => res.json())
                .then(chats => {
                    userChats = chats;
                    renderChats();
                });
        });
        
        socket.on('new_message', (message) => {
            if (currentChatId === message.chatId) {
                if (!currentChat.messages) currentChat.messages = [];
                // Удаляем временное сообщение если есть
                currentChat.messages = currentChat.messages.filter(m => !m.id.startsWith('temp'));
                currentChat.messages.push(message);
                renderMessages();
            }
            
            const chat = userChats.find(c => c.id === message.chatId);
            if (chat) {
                chat.lastMessage = message;
                renderChats();
            }
            
            if (message.from !== currentUser.id && !document.hasFocus()) {
                if (Notification.permission === 'granted') {
                    new Notification('Новое сообщение', { body: message.text || 'Файл' });
                }
            }
        });
        
        socket.on('chat_update', (data) => {
            const chat = userChats.find(c => c.id === data.chatId);
            if (chat) {
                chat.lastMessage = data.lastMessage;
                renderChats();
            }
        });
        
        socket.on('user_typing', (data) => {
            if (currentChatId === data.chatId && data.userId !== currentUser.id) {
                const statusEl = document.getElementById('chatStatus');
                if (data.isTyping) {
                    statusEl.innerHTML = '<span class="typing-indicator">печатает<span class="typing-animation"><span>.</span><span>.</span><span>.</span></span></span>';
                } else {
                    statusEl.textContent = currentChat?.type === 'group' ? `${currentChat.participants?.length || 0} участников` : (currentChat?.online ? 'онлайн' : 'офлайн');
                }
            }
        });
        
        socket.on('profile_updated', (data) => {
            if (currentUser) {
                currentUser.name = data.name;
                currentUser.bio = data.bio;
                document.getElementById('sidebarName').textContent = currentUser.name || currentUser.username;
            }
        });
    }
    
    // ============ АУТЕНТИФИКАЦИЯ ============
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        
        const data = await res.json();
        if (res.ok) {
            initSocket();
            socket.emit('login', { username, password });
        } else {
            document.getElementById('loginError').textContent = data.error;
            document.getElementById('loginError').style.display = 'block';
        }
    });
    
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('regUsername').value;
        const name = document.getElementById('regName').value;
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPassword').value;
        
        if (password !== confirm) {
            document.getElementById('registerError').textContent = 'Пароли не совпадают';
            document.getElementById('registerError').style.display = 'block';
            return;
        }
        
        const res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, name })
        });
        
        const data = await res.json();
        if (res.ok) {
            document.getElementById('loginUsername').value = username;
            document.getElementById('loginPassword').value = password;
            document.querySelector('[data-tab="login"]').click();
        } else {
            document.getElementById('registerError').textContent = data.error;
            document.getElementById('registerError').style.display = 'block';
        }
    });
    
    // Переключение табов
    document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const isLogin = tab.dataset.tab === 'login';
            document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
            document.getElementById('registerForm').classList.toggle('hidden', isLogin);
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('registerError').style.display = 'none';
        });
    });
    
    // ============ ОБРАБОТЧИКИ ИНТЕРФЕЙСА ============
    sendBtn.addEventListener('click', sendMessage);
    
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    
    messageInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        
        if (socket && currentChatId) {
            if (typingTimeout) clearTimeout(typingTimeout);
            if (!isTyping) {
                isTyping = true;
                socket.emit('typing', { chatId: currentChatId, isTyping: true });
            }
            typingTimeout = setTimeout(() => {
                isTyping = false;
                socket.emit('typing', { chatId: currentChatId, isTyping: false });
            }, 1000);
        }
    });
    
    document.getElementById('attachFileBtn').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.multiple = true;
        input.onchange = async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const formData = new FormData();
                formData.append('file', file);
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                pendingFiles.push({ url: data.url, name: data.name });
            }
            if (pendingFiles.length && !messageInput.value.trim()) {
                sendMessage();
            }
        };
        input.click();
    });
    
    document.getElementById('attachImageBtn').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,video/*';
        input.multiple = true;
        input.onchange = async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const formData = new FormData();
                formData.append('file', file);
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                pendingFiles.push({ url: data.url, name: data.name });
            }
            if (pendingFiles.length && !messageInput.value.trim()) {
                sendMessage();
            }
        };
        input.click();
    });
    
    // Профиль
    document.getElementById('profileBtn').addEventListener('click', () => {
        document.getElementById('profileNameInput').value = currentUser?.name || '';
        document.getElementById('profileBioInput').value = currentUser?.bio || '';
        document.getElementById('profileModal').classList.add('active');
    });
    
    document.getElementById('saveProfileBtn').addEventListener('click', () => {
        const name = document.getElementById('profileNameInput').value;
        const bio = document.getElementById('profileBioInput').value;
        socket.emit('update_profile', { name, bio });
        document.getElementById('profileModal').classList.remove('active');
    });
    
    document.getElementById('closeProfileModal').addEventListener('click', () => {
        document.getElementById('profileModal').classList.remove('active');
    });
    
    document.getElementById('cancelProfileBtn').addEventListener('click', () => {
        document.getElementById('profileModal').classList.remove('active');
    });
    
    // Новый чат
    document.getElementById('newChatBtn').addEventListener('click', () => {
        document.getElementById('newChatModal').classList.add('active');
        fetch('/api/users')
            .then(res => res.json())
            .then(users => {
                const container = document.getElementById('searchUsersList');
                container.innerHTML = users.filter(u => u.id !== currentUser?.id).map(user => `
                    <div class="contact-item" data-user-id="${user.id}">
                        <div class="chat-avatar">${(user.name || user.username).charAt(0).toUpperCase()}</div>
                        <div class="chat-info">
                            <div class="chat-name">${escapeHtml(user.name || user.username)}</div>
                            <div class="chat-preview">${user.online ? 'онлайн' : 'офлайн'}</div>
                        </div>
                    </div>
                `).join('');
                document.querySelectorAll('#searchUsersList .contact-item').forEach(el => {
                    el.addEventListener('click', () => {
                        createPrivateChat(el.dataset.userId);
                        document.getElementById('newChatModal').classList.remove('active');
                    });
                });
            });
    });
    
    document.getElementById('closeNewChatModal').addEventListener('click', () => {
        document.getElementById('newChatModal').classList.remove('active');
    });
    
    // Поиск
    searchInput.addEventListener('input', () => {
        renderChats();
        renderContacts();
    });
    
    // Мобильное меню
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileOverlay = document.getElementById('mobileOverlay');
    const sidebar = document.getElementById('sidebar');
    
    if (mobileMenuBtn) {
        mobileMenuBtn.addEventListener('click', () => {
            sidebar.classList.add('open');
            mobileOverlay.classList.add('open');
        });
    }
    
    if (mobileOverlay) {
        mobileOverlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            mobileOverlay.classList.remove('open');
        });
    }
    
    // Запрос уведомлений
    if ('Notification' in window && Notification.permission !== 'denied') {
        Notification.requestPermission();
    }
    
    // Информация о чате
    document.getElementById('chatInfoActionBtn')?.addEventListener('click', () => {
        if (currentChat) {
            document.getElementById('chatInfoTitle').textContent = currentChat.name;
            if (currentChat.type === 'group') {
                document.getElementById('chatInfoBody').innerHTML = `
                    <p><strong>Тип:</strong> Группа</p>
                    <p><strong>Участники:</strong> ${currentChat.participants?.length || 0}</p>
                    <p><strong>Создан:</strong> ${new Date(currentChat.createdAt).toLocaleString()}</p>
                `;
            } else {
                const user = allUsers.find(u => u.id === currentChat.participants?.find(p => p !== currentUser?.id));
                document.getElementById('chatInfoBody').innerHTML = `
                    <p><strong>Тип:</strong> Личный чат</p>
                    <p><strong>Собеседник:</strong> ${user?.name || user?.username}</p>
                    <p><strong>Статус:</strong> ${user?.online ? 'Онлайн' : 'Офлайн'}</p>
                `;
            }
            document.getElementById('chatInfoModal').classList.add('active');
        }
    });
    
    document.getElementById('closeChatInfoModal')?.addEventListener('click', () => {
        document.getElementById('chatInfoModal').classList.remove('active');
    });
    
    // Добавление участника в группу
    document.getElementById('chatAddMemberBtn')?.addEventListener('click', () => {
        if (currentChat && currentChat.type === 'group') {
            fetch('/api/users')
                .then(res => res.json())
                .then(users => {
                    const container = document.getElementById('addMemberList');
                    container.innerHTML = users.filter(u => 
                        u.id !== currentUser?.id && 
                        !currentChat.participants?.includes(u.id)
                    ).map(user => `
                        <div class="contact-item" data-user-id="${user.id}">
                            <div class="chat-avatar">${(user.name || user.username).charAt(0).toUpperCase()}</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(user.name || user.username)}</div>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('addMemberModal').classList.add('active');
                    
                    document.querySelectorAll('#addMemberList .contact-item').forEach(el => {
                        el.addEventListener('click', () => {
                            const userId = el.dataset.userId;
                            fetch('/api/group/add', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ chatId: currentChatId, userId, addedBy: currentUser.id })
                            });
                            document.getElementById('addMemberModal').classList.remove('active');
                        });
                    });
                });
        }
    });
    
    document.getElementById('closeAddMemberModal')?.addEventListener('click', () => {
        document.getElementById('addMemberModal').classList.remove('active');
    });
    
    document.getElementById('cancelAddMemberBtn')?.addEventListener('click', () => {
        document.getElementById('addMemberModal').classList.remove('active');
    });
</script>
</body>
</html>
